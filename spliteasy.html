<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="theme-color" content="#1A1A2E"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>หารก่อนจน (HJK)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F7F5F0;--card:#FFFFFF;
  --accent:#FF5C3A;--accent-lt:#FFF0ED;--accent-soft:#FFD6CE;
  --sage:#4CAF7D;--sage-lt:#E8F5EE;
  --ink:#1A1A2E;--muted:#8A8A9A;--border:#EDEAE4;
  --danger:#FF3B5C;--gold:#F5A623;--gold-lt:#FEF6E8;
  --blue:#3B82F6;--blue-lt:#EFF6FF;
  --purple:#8B5CF6;--purple-lt:#F5F3FF;
  --hjk-primary:#2D5A3D;
  --hjk-primary-lt:#E8F0EB;
  --hjk-primary-text:#FFFFFF;
  --hjk-surface:#F8F8F5;
}
html{height:100%}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--ink);min-height:100%;overflow-x:hidden}
body.th{font-family:'Sarabun',sans-serif}
::-webkit-scrollbar{width:0}
input,button,select,textarea{font-family:inherit}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

#app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative}

.screen{min-height:100vh;padding-bottom:92px;animation:slideUp .28s cubic-bezier(.22,1,.36,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}

.card{background:var(--card);border-radius:20px;padding:18px;box-shadow:0 2px 14px rgba(26,26,46,.07)}
.gap-col{display:flex;flex-direction:column;gap:14px}

.btn{width:100%;border:none;cursor:pointer;transition:transform .12s,opacity .12s;border-radius:16px;font-size:15px;font-weight:600;padding:15px 20px}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:disabled{opacity:.4;pointer-events:none}
.btn-secondary{background:var(--accent-lt);color:var(--accent)}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border);border-radius:14px}
.btn-ghost:active{background:var(--border)}
.btn-danger{background:#FEE2E2;color:var(--danger);border:none;border-radius:14px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer}
.btn-icon{background:var(--bg);border:none;border-radius:12px;width:40px;height:40px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-sm{width:auto;padding:8px 16px;font-size:13px;border-radius:12px}

.lang-toggle{display:flex;background:rgba(0,0,0,.08);border-radius:100px;padding:3px;gap:2px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.lang-btn{padding:5px 12px;border:none;border-radius:100px;font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:rgba(0,0,0,.4);transition:all .15s;letter-spacing:.03em}
.lang-btn.on{background:#fff;color:var(--accent);box-shadow:0 2px 6px rgba(0,0,0,.1)}
body.th .lang-btn{font-family:'Sarabun',sans-serif}
.hero .lang-toggle{background:rgba(255,255,255,.12)}
.hero .lang-btn{color:rgba(255,255,255,.5)}
.hero .lang-btn.on{background:#fff;color:var(--accent)}

.input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:14px;padding:13px 15px;font-size:16px;color:var(--ink);outline:none;transition:border-color .2s;-webkit-appearance:none}
.input.invalid{border-color:var(--danger)!important;background:var(--red-bg)!important}
.input-err{color:var(--danger);font-size:11px;font-weight:600;margin-top:4px;display:none}
.input.invalid + .input-err{display:block}

.lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px}

.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.av-sm{width:32px;height:32px;font-size:11px}
.av-xs{width:22px;height:22px;font-size:9px}
.av-0{background:#FFD6CE;color:#FF5C3A}.av-1{background:#D6E8FF;color:#2563EB}
.av-2{background:#D6F5E3;color:#16A34A}.av-3{background:#FEF3C7;color:#D97706}
.av-4{background:#EDE9FE;color:#7C3AED}.av-5{background:#FCE7F3;color:#DB2777}
.av-6{background:#CCFBF1;color:#0D9488}.av-7{background:#FEE2E2;color:#DC2626}

.row{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:16px;padding:13px 14px;box-shadow:0 1px 6px rgba(26,26,46,.05);cursor:pointer;transition:transform .12s}
.row:active{transform:scale(.98)}
.row+.row{margin-top:8px}
.row-compact{background:var(--card);border:1px solid rgba(237,234,228,.9);border-radius:18px;box-shadow:0 1px 8px rgba(26,26,46,.045);margin-bottom:8px;overflow:hidden;transition:border-color .16s,box-shadow .16s}
.row-compact.open{border-color:rgba(255,92,58,.22);box-shadow:0 10px 28px rgba(26,26,46,.08)}
.row-compact.invalid-row{border-color:var(--danger)}
.row-main{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer;min-height:64px}
.row-main:active{transform:scale(.99)}
.row-main-text{flex:1;min-width:0}
.row-main-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-main-sub{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-detail{display:none;padding:0 14px 14px 70px;color:var(--muted)}
.row-compact.open .row-detail{display:block;animation:detailIn .18s cubic-bezier(.22,1,.36,1)}
.row-chevron{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--muted);font-size:13px;transition:transform .18s,color .18s,background .18s;flex-shrink:0}
.row-compact.open .row-chevron{transform:rotate(90deg);background:var(--accent-lt);color:var(--accent)}
.row-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.row-action{width:auto;padding:7px 12px;border-radius:999px;border:1px solid var(--border);background:#fff;color:var(--ink);font-size:12px;font-weight:700;cursor:pointer}
.row-action.primary{background:var(--accent-lt);color:var(--accent);border-color:transparent}
.row-action.sage{background:var(--sage-lt);color:var(--sage);border-color:transparent}
.row-action.danger{background:#FEE2E2;color:var(--danger);border-color:transparent}
@keyframes detailIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

.pills{display:flex;background:var(--bg);border-radius:14px;padding:4px;gap:3px}
.pill{flex:1;padding:9px 6px;border-radius:11px;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .18s;text-align:center}
.pill.on{background:var(--card);color:var(--accent);font-weight:700;box-shadow:0 2px 8px rgba(26,26,46,.08)}

.chk{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;font-size:12px;color:transparent}
.chk.on{background:var(--sage);border-color:var(--sage);color:#fff}
.chk-sq{width:24px;height:24px;border-radius:7px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;font-size:12px;color:transparent}
.chk-sq.on{background:var(--sage);border-color:var(--sage);color:#fff}

.prog-track{background:var(--border);border-radius:100px;height:8px;overflow:hidden}
.prog-fill{height:100%;border-radius:100px;background:var(--sage);transition:width .5s cubic-bezier(.22,1,.36,1)}

#bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:10px 0 20px;z-index:100;display:flex;justify-content:space-around}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 7px;transition:transform .12s;color:var(--muted);flex:1;min-width:0}
.nav-btn:active{transform:scale(.88)}
.nav-btn.on{color:var(--hjk-primary)}
.nav-btn .ni{font-size:21px;line-height:1;min-width:34px;height:32px;border-radius:12px;display:flex;align-items:center;justify-content:center;transition:background .16s,color .16s}
.nav-btn .nl{font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.nav-btn.on .ni{background:var(--hjk-primary-lt);color:var(--hjk-primary)}
.nav-btn.on .nl{font-weight:700;color:var(--hjk-primary)}

.overlay{position:fixed;inset:0;background:rgba(26,26,46,.45);z-index:200;display:flex;align-items:flex-end;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{width:100%;max-width:430px;margin:0 auto;background:var(--card);border-radius:28px 28px 0 0;padding:20px 20px 36px;animation:sheetUp .3s cubic-bezier(.22,1,.36,1);max-height:88vh;overflow-y:auto}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:100px;margin:0 auto 18px}

#toast{position:fixed;top:56px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:100px;font-size:14px;font-weight:500;z-index:999;white-space:nowrap;pointer-events:none;box-shadow:0 4px 20px rgba(26,26,46,.2);transition:opacity .3s}
#toast.hide{opacity:0}

.hero{background:linear-gradient(145deg,var(--hjk-primary) 0%,#244832 100%);padding:58px 20px 24px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.16),transparent 70%)}
.hero::after{content:'';position:absolute;bottom:-20px;left:20px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(76,175,125,.2),transparent 70%)}
.glass{background:rgba(255,255,255,.1);backdrop-filter:blur(10px);border-radius:18px;padding:16px 18px;border:1px solid rgba(255,255,255,.12)}

.emoji-grid{display:flex;flex-wrap:wrap;gap:8px}
.emoji-btn{width:48px;height:48px;border-radius:14px;font-size:22px;border:2px solid transparent;background:var(--bg);cursor:pointer;transition:all .15s}
.emoji-btn.on{border-color:var(--accent);background:var(--accent-lt)}

.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sec-hdr h3{font-family:'Fraunces',serif;font-size:19px;font-weight:700}

.member-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.member-row:last-child{border-bottom:none}

.cycle-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700}
.cycle-monthly{background:var(--blue-lt);color:var(--blue)}
.cycle-weekly{background:var(--purple-lt);color:var(--purple)}

.cl-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);border-radius:14px;margin-bottom:8px;transition:opacity .2s;box-shadow:0 1px 6px rgba(26,26,46,.05)}
.cl-item.done{opacity:.55}
.cl-item.done .cl-title{text-decoration:line-through;color:var(--muted)}

.owe-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.owe-row:last-child{border-bottom:none}

.txt-muted{color:var(--muted)}.txt-accent{color:var(--accent)}.txt-sage{color:var(--sage)}.txt-danger{color:var(--danger)}.txt-blue{color:var(--blue)}
.fw7{font-weight:700}.ff-s{font-family:'Fraunces',serif}
.fs-big{font-family:'Fraunces',serif;font-size:38px;font-weight:700;letter-spacing:-1px;line-height:1}
.px16{padding-left:16px;padding-right:16px}
.flex{display:flex}.items-center{align-items:center}.gap8{gap:8px}.gap12{gap:12px}
.flex1{flex:1;min-width:0}.text-right{text-align:right}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.w-full{width:100%}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}
.p20{padding:20px}.pt56{padding-top:56px}
.text-center{text-align:center}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .ei{font-size:44px;margin-bottom:10px}
.empty p{font-size:14px}
.divider{height:1px;background:var(--border)}

/* ── CATEGORY CHIPS ───────────────────────── */
.cat-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-chip{flex-shrink:0;padding:7px 14px;border-radius:100px;border:1.5px solid var(--border);background:var(--card);font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.cat-chip.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── DEBT BADGE ────────────────────────────── */
.debt-badge{background:var(--danger);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;margin-left:6px;vertical-align:middle}

/* ── BALANCE CARD (I Owe / Owed to me) ─────── */
.bal-card{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--card);border-radius:16px;box-shadow:0 1px 6px rgba(26,26,46,.05);margin-bottom:8px}
.bal-card .amt-pill{padding:6px 14px;border-radius:100px;font-family:'Fraunces',serif;font-weight:700;font-size:15px;white-space:nowrap}
.bal-card .amt-owe{background:#FEE2E2;color:var(--danger)}
.bal-card .amt-owed{background:var(--sage-lt);color:var(--sage)}
.amt-pill{padding:6px 14px;border-radius:100px;font-family:'Fraunces',serif;font-weight:700;font-size:15px;white-space:nowrap}
.amt-owe{background:#FEE2E2;color:var(--danger)}
.amt-owed{background:var(--sage-lt);color:var(--sage)}

/* ── SETTLE SHEET ──────────────────────────── */
.settle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.settle-row:last-child{border-bottom:none}

/* ── MONTHLY SUMMARY ───────────────────────── */
.mo-section{background:var(--card);border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(26,26,46,.05)}
.mo-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.mo-row:last-child{border-bottom:none}
.mo-total{background:linear-gradient(135deg,var(--ink),#2D2D4E);border-radius:16px;padding:16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}

/* ── SPENDING CHART (SVG bar chart) ────────── */
.chart-wrap{background:var(--card);border-radius:20px;padding:18px;box-shadow:0 2px 14px rgba(26,26,46,.07)}
.chart-bar-bg{fill:var(--border)}
.chart-bar-fill{fill:var(--accent);transition:height .5s cubic-bezier(.22,1,.36,1)}
.chart-label{font-size:10px;fill:var(--muted);font-family:'DM Sans',sans-serif;text-anchor:middle}
.chart-val{font-size:9px;fill:var(--ink);font-family:'Fraunces',serif;font-weight:700;text-anchor:middle}

/* ── NOTE FIELD ────────────────────────────── */
.note-ta{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:14px;padding:12px 14px;font-size:14px;color:var(--ink);outline:none;resize:none;min-height:72px;transition:border-color .2s;font-family:inherit}
.note-ta:focus{border-color:var(--accent);background:#fff}
.note-ta::placeholder{color:var(--muted)}

/* ── SUB-ITEM CARD ─────────────────────────── */
.sub-item-card{background:var(--bg);border-radius:14px;padding:12px 14px;margin-bottom:8px;border:1.5px solid var(--border)}
.sub-item-card:last-child{margin-bottom:0}
.si-consumer-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.si-consumer-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:100px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--muted)}
.si-consumer-btn.on{border-color:var(--sage);background:var(--sage-lt);color:var(--sage)}
.si-payer-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:100px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--muted)}
.si-payer-btn.on{border-color:var(--accent);background:var(--accent-lt);color:var(--accent)}
.si-total-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:12px;margin-top:6px}
.si-total-ok{background:var(--sage-lt);color:var(--sage)}
.si-total-err{background:#FEE2E2;color:var(--danger)}

/* ── CALCULATOR KEYPAD ──────────────────────── */
.calc-overlay {
  position: fixed; inset: 0; background: rgba(26,26,46,0.45);
  z-index: 1000; display: flex; align-items: flex-end;
  animation: fadeIn 0.2s ease;
}
.calc-sheet {
  width: 100%; max-width: 430px; margin: 0 auto;
  background: var(--card); border-radius: 28px 28px 0 0;
  padding: 20px 20px 32px; box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
  animation: sheetUp 0.3s cubic-bezier(.22,1,.36,1);
}
.calc-header {
  background: var(--bg); padding: 16px; border-radius: 18px;
  margin-bottom: 20px; min-height: 84px;
  display: flex; flex-direction: column; justify-content: center; align-items: flex-end;
  border: 1.5px solid var(--border);
}
.calc-display {
  font-size: 26px; font-weight: 700; color: var(--ink);
  word-break: break-all; text-align: right; line-height: 1.2;
}
.calc-preview {
  font-size: 14px; color: var(--muted); font-weight: 600; margin-top: 6px;
}
.calc-preview.err { color: var(--danger); }
.calc-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
}
.calc-btn {
  border: none; border-radius: 16px; height: 68px;
  font-size: 24px; font-weight: 600; cursor: pointer;
  transition: transform 0.1s, background 0.1s;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg); color: var(--ink);
}
.calc-btn:active { transform: scale(0.92); background: var(--border); }
.calc-btn.op { background: var(--accent-lt); color: var(--accent); }
.calc-btn.del { background: #FEE2E2; color: var(--danger); font-size: 20px; }
.calc-btn.eq { background: var(--accent); color: #fff; grid-column: span 2; font-size: 28px; }
.calc-btn.paren { background: var(--border); color: var(--muted); }

/* ── MATH EXPRESSION PREVIEW ─────────────────────────── */
.math-preview{
  display:none !important;
}
.math-wrap{position:relative;display:flex;flex:1}
.math-wrap .input{width:100%}
.math-wrap-block{position:relative}
.math-wrap-block .input{width:100%}
.math-wrap-block .math-preview{bottom:calc(100% + 4px)}

/* ── BANK DROPDOWN & PAYMENT PROFILE ──────────────── */
.bank-item{display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid var(--border);cursor:pointer}
.bank-item:last-child{border-bottom:none}
.bank-icon{width:28px;height:28px;border-radius:6px;object-fit:contain;background:#f0f0f0}
.bank-name{font-size:14px;font-weight:600}
.bank-code{font-size:11px;color:var(--muted);margin-left:auto}

.pay-card{background:var(--card);border-radius:20px;padding:20px;box-shadow:0 4px 20px rgba(0,0,0,0.08);margin-bottom:16px;border:1px solid var(--border)}
.pay-qr{width:160px;height:160px;margin:15px auto;display:block;border-radius:12px;background:#f9f9f9;border:1px solid var(--border)}
.pay-method{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding:10px;background:var(--bg);border-radius:12px}

.export-item-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid #f0f0f0}
.export-item-row:last-child{border-bottom:none}
.export-participant-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);padding-left:12px}

/* ── SEARCHABLE SELECT ──────────────────────────── */
.search-select-wrap{position:relative}
.search-select-list{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:14px;max-height:200px;overflow-y:auto;z-index:1000;box-shadow:0 10px 30px rgba(0,0,0,0.1);margin-top:4px}

/* ── SPORT SPLIT ─────────────────────────── */
.sport-hero{background:linear-gradient(145deg,#102A43 0%,#1A1A2E 58%,#3A2C1F 100%);padding:56px 20px 24px;color:#fff;position:relative;overflow:hidden}
.sport-hero::after{content:'';position:absolute;right:-44px;top:32px;width:170px;height:170px;border-radius:50%;background:radial-gradient(circle,rgba(76,175,125,.28),transparent 68%)}
.sport-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.sport-card{background:var(--card);border-radius:20px;padding:16px;box-shadow:0 2px 14px rgba(26,26,46,.07);border:1px solid rgba(237,234,228,.8)}
.sport-team{background:linear-gradient(180deg,#fff,#FFFCF8);border:1px solid var(--border);border-radius:18px;padding:14px;margin-bottom:10px}
.sport-emoji-row{display:flex;gap:6px;overflow-x:auto;padding:4px 0 2px;scrollbar-width:none}
.sport-emoji-row::-webkit-scrollbar{display:none}
.sport-emoji{width:36px;height:36px;border-radius:12px;border:1.5px solid var(--border);background:#fff;font-size:18px;cursor:pointer;flex-shrink:0}
.sport-emoji.on{border-color:var(--accent);background:var(--accent-lt)}
.sport-preview{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.sport-preview-box{background:var(--bg);border-radius:14px;padding:10px;border:1px solid var(--border)}
.summary-action-wrap{display:flex;gap:8px;flex-wrap:wrap}
.summary-action-wrap .btn{min-width:150px;flex:1}

/* ── HJK REBRAND UI ───────────────────────── */
.hjk-green-panel{background:linear-gradient(135deg,var(--hjk-primary),#244832);border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:22px 20px;color:#fff;box-shadow:0 14px 34px rgba(45,90,61,.22)}
.hjk-filter-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hjk-filter-pill{background:#fff;border:1px solid var(--border);border-radius:14px;padding:13px 14px;display:flex;align-items:center;justify-content:space-between;font-size:14px;font-weight:700;color:var(--ink)}
.iowe-row-wrap{margin-bottom:10px}
.iowe-row-compact{display:flex;align-items:center;gap:12px;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:16px;cursor:pointer;box-shadow:0 1px 6px rgba(26,26,46,.045);transition:background .15s,border-radius .15s,border-color .15s}
.iowe-row-compact:active{background:var(--bg)}
.iowe-row-compact.expanded{border-radius:16px 16px 0 0;border-bottom-color:transparent}
.iowe-row-compact .row-chevron{background:transparent;color:var(--muted);font-size:15px;transform:none}
.iowe-row-compact.expanded .row-chevron{transform:rotate(180deg);background:transparent;color:var(--hjk-primary)}
.iowe-row-detail{background:#F9FAF8;padding:14px 16px;border:1px solid var(--border);border-top:none;border-radius:0 0 16px 16px;display:none}
.iowe-row-detail.open{display:block;animation:detailIn .18s cubic-bezier(.22,1,.36,1)}
.iowe-detail-row{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.iowe-detail-row:last-of-type{border-bottom:none}
.hjk-primary-action{width:100%;margin-top:12px;padding:13px;background:var(--hjk-primary);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.summary-collapse-section{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 6px rgba(26,26,46,.045)}
.summary-collapse-header{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;transition:background .15s}
.summary-collapse-header:active{background:var(--bg)}
.summary-collapse-icon{font-size:20px;flex-shrink:0;color:var(--hjk-primary)}
.summary-collapse-title{flex:1;font-size:15px;font-weight:700}
.summary-collapse-value{font-size:20px;font-weight:800;font-family:'Fraunces',serif;color:var(--hjk-primary)}
.summary-collapse-chevron{color:var(--muted);font-size:16px;transition:transform .2s}
.summary-collapse-section.open .summary-collapse-chevron{transform:rotate(180deg)}
.summary-collapse-body{padding:0 16px 14px;display:none}
.summary-collapse-section.open .summary-collapse-body{display:block;animation:detailIn .18s cubic-bezier(.22,1,.36,1)}
.summary-mini-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.summary-mini-row:last-child{border-bottom:none}
@media (max-width:380px){
  .row-detail{padding-left:14px}
  .sport-stat-grid,.sport-preview{grid-template-columns:1fr}
  #bottom-nav{padding-bottom:18px}
  .nav-btn{padding:4px 3px}
  .nav-btn .nl{font-size:9px}
}
</style>

        <button class="calc-btn num" onclick="calcPush('6')">6</button>

        <button class="calc-btn num" onclick="calcPush('1')">1</button>

        <button class="calc-btn num" onclick="calcPush('3')">3</button>
        <button class="calc-btn op" onclick="calcPush('+')">+</button>
        
        <button class="calc-btn num" onclick="calcPush('0')">0</button>
        <button class="calc-btn num" onclick="calcPush('.')">.</button>

function syncJKJPendingDebtsFromSplitEasy(){
  const now=new Date().toISOString();
  const current=[];
  (S.groups||[]).forEach(g=>{
    const group=revalidateGroup(g);
    const pairs=getPairwise(group.members||[], group.expenses||[]);
    pairs.forEach(pair=>{
      const debtor=(group.members||[]).find(m=>m.id===pair.from);
      const creditor=(group.members||[]).find(m=>m.id===pair.to);
      if(!debtor||!creditor||!(+pair.amount>0))return;
      current.push({
        debtId:`se:${group.id}:${pair.from}->${pair.to}`,
        groupId:group.id,
        groupName:group.name||'หารก่อนจน (HJK)',
        debtor:debtor.isMe?'You':(debtor.name||'Unknown'),
        creditor:creditor.isMe?'You':(creditor.name||'Unknown'),
        debtorId:pair.from,
        creditorId:pair.to,
        debtorIsMe:!!debtor.isMe,
        creditorIsMe:!!creditor.isMe,
        amount:+(+pair.amount||0).toFixed(2),
        status:'pending',
        source:'spliteasy'
      });
    });
  });
  const store=jkjReadPendingDebts();
  const existing=new Map((store.items||[]).map(item=>[item.debtId,item]));
  const currentIds=new Set(current.map(item=>item.debtId));
  const merged=current.map(item=>{
    const old=existing.get(item.debtId)||{};
    return {...old,...item,status:'pending',createdAt:old.createdAt||now,updatedAt:now,clearedAt:'',clearedTransactionId:'',splitEasySettlementId:old.splitEasySettlementId||''};
  });
  (store.items||[]).forEach(item=>{
    if(item.source==='spliteasy'&&item.groupId&&!currentIds.has(item.debtId)){
      if(item.status==='cleared') merged.push(item);
      else merged.push({...item,status:'cleared',updatedAt:now,clearedAt:item.clearedAt||now});
    } else if(item.source!=='spliteasy'||!item.groupId){
      merged.push(item);
    }
  });
  jkjWritePendingDebts({items:merged});
}
function recordJKJFromSplitEasy(payload){
  const amount=+(payload?.amount||0);
  if(!amount){toast(t('fillTitleAmt'));return;}
  const type=payload.type==='income'?'income':'expense';
  const tx={
    id:'se-'+uid()+'-'+Date.now(),
    type,
    mode:'single',
    title:payload.title||'หารก่อนจน (HJK)',
    amount:+amount.toFixed(2),
    category:payload.category||(type==='income'?'เงินคืน':'บิลกลุ่ม'),
    date:payload.date||todayStr(),
    time:payload.time||jkjCurrentTime(),
    note:payload.note||'บันทึกจาก หารก่อนจน (HJK)',
    source:'spliteasy',
    splitEasyGroupId:payload.groupId||'',
    splitEasyExpenseId:payload.expenseId||'',
    createdAt:new Date().toISOString()
  };
  const txs=jkjReadTx();
  if(txs.some(x=>x.source==='spliteasy'&&x.splitEasyGroupId===tx.splitEasyGroupId&&x.splitEasyExpenseId===tx.splitEasyExpenseId&&Math.abs((+x.amount||0)-tx.amount)<0.01&&x.type===tx.type)){
    toast('รายการนี้อยู่ใน JKJ แล้ว');
    return;
  }
  txs.unshift(tx);
  jkjWriteTx(txs);
  toast('บันทึกเข้า JKJ แล้ว');
}

function uniqIds(ids){return [...new Set((ids||[]).filter(Boolean))];}
function validMemberSet(g){return new Set((g.members||[]).map(m=>m.id));}
function resolveMemberId(g,ref){
  if(!ref)return ref;
  const members=g.members||[];
  if(members.some(m=>m.id===ref))return ref;
  const byName=members.find(m=>m.name===ref||(m.isMe&&ref==='You'));
  return byName?byName.id:ref;
}
function normalizeRefMap(g,obj){
  const out={};
  Object.entries(obj||{}).forEach(([id,val])=>{
    const next=resolveMemberId(g,id);
    out[next]=(+(out[next]||0))+(+val||0);
  });
  return out;
}
function normalizeExpenseRefs(g,exp){
  const validIds = validMemberSet(g);
  const fallback = g.members[0]?.id;
  const n = {
    ...exp,
    paidById:resolveMemberId(g,exp.paidById),
    payers:exp.payers?uniqPayers(exp.payers.map(p=>({...p,id:resolveMemberId(g,p.id)}))):exp.payers,
    participants:exp.participants?uniqIds(exp.participants.map(id=>resolveMemberId(g,id))):exp.participants,
    customAmounts:normalizeRefMap(g,exp.customAmounts),
    percentages:normalizeRefMap(g,exp.percentages),
    subItems:(exp.subItems||[]).map(s=>({
      ...s,
      payerId:resolveMemberId(g,s.payerId),
      consumers:uniqIds((s.consumers||[]).map(id=>resolveMemberId(g,id)))
    }))
  };
  // Heal invalid payer refs
  if((!n.paidById || !validIds.has(n.paidById)) && fallback) n.paidById = fallback;
  if(n.payers && n.payers.length > 0){
    const invalid = n.payers.find(p => !validIds.has(p.id));
    if(invalid && fallback){
      const validPayers = n.payers.filter(p => validIds.has(p.id));
      const totalInvalid = n.payers.filter(p => !validIds.has(p.id)).reduce((a,b)=>a+(+b.amt||0),0);
      const fp = validPayers.find(p => p.id === fallback);
      if(fp) fp.amt += totalInvalid; else validPayers.push({id:fallback, amt:totalInvalid});
      n.payers = validPayers;
    }
  } else if((+n.amount > 0) && fallback) {
    n.payers = [{id:fallback, amt:+n.amount}];
  }
  // Heal invalid sub-item refs
  n.subItems = n.subItems.map(s => {
    if((!s.payerId || !validIds.has(s.payerId)) && fallback) s.payerId = fallback;
    if((s.consumers||[]).length === 0 && fallback) s.consumers = [fallback];
    return s;
  });
  return n;
}
function isMemberReferenced(g,mid){
  return (g.expenses||[]).some(e=>
    e.paidById===mid ||
    (e.payers||[]).some(p=>p.id===mid) ||
    (e.participants||[]).includes(mid) ||
    Object.prototype.hasOwnProperty.call(e.customAmounts||{},mid) ||
    Object.prototype.hasOwnProperty.call(e.percentages||{},mid) ||
    (e.subItems||[]).some(s=>s.payerId===mid || (s.consumers||[]).includes(mid))
  );

function replaceIdInMap(obj,oldId,newId){

  });

function replaceMemberRefsInExpense(exp,oldId,newId){

    participants:uniqIds((exp.participants||[]).map(id=>id===oldId?newId:id)),

function removeMemberRefsFromExpense(exp,mid,fallbackId){
  const customAmounts={...exp.customAmounts};delete customAmounts[mid];

  let newPaidById = exp.paidById === mid ? fallbackId : exp.paidById;

  let newPayers = (exp.payers||[]).filter(p=>p.id!==mid);

  if(deletedPayer && fallbackId){

    if(fp) fp.amt += deletedPayer.amt;
    else newPayers.push({id:fallbackId, amt:deletedPayer.amt});
  }

  if(newPayers.length === 0 && exp.amount > 0 && fallbackId){
    newPayers = [{id:fallbackId, amt:exp.amount}];
  }

  return {
    ...exp,
    paidById:newPaidById,
    payers:newPayers,
    participants:(exp.participants||[]).filter(id=>id!==mid),
    customAmounts,percentages,
    subItems:(exp.subItems||[]).map(s=>{
      let nc = (s.consumers||[]).filter(id=>id!==mid);
      // If no consumers left for this sub-item, assign to fallback
      if(nc.length === 0 && fallbackId) nc = [fallbackId];

function uniqPayers(payers){

function validateExpenseRefs(g,exp){
  const ids=validMemberSet(g),issues=[];
  const payerIds=(exp.payers&&exp.payers.length?exp.payers:[exp.paidById?{id:exp.paidById,amt:exp.amount}:null]).filter(Boolean);
  if(!payerIds.length)issues.push('missing payer');
  payerIds.forEach(p=>{if(!ids.has(p.id))issues.push('invalid payer');});
  if(exp.paidById&&!ids.has(exp.paidById))issues.push('deleted payer');
  (exp.participants||[]).forEach(id=>{if(!ids.has(id))issues.push('invalid participant');});
  if((exp.splitType!=='subitem')&&!(exp.participants||[]).length)issues.push('missing participant');
  (exp.subItems||[]).forEach(s=>{
    if(!s.payerId||!ids.has(s.payerId))issues.push('invalid item payer');
    if(!(s.consumers||[]).length)issues.push('empty item consumers');
    (s.consumers||[]).forEach(id=>{if(!ids.has(id))issues.push('invalid item consumer');});
  });
  return [...new Set(issues)];
}
function revalidateGroup(g){

}

function invalidExpenses(g){return (revalidateGroup(g).expenses||[]).filter(e=>(e.invalidReasons||[]).length);}

/* ── Safe Math Expression Evaluator (PEMDAS) ────────── */
function evalMath(str) {
  if (typeof str !== 'string') return NaN;
  const s = str.replace(/\s+/g, '').replace(/,/g, '');
  if (!s) return 0;
  // Strictly allow only numbers, operators, and parentheses
  if (!/^[0-9+\-*/().]+$/.test(s)) return NaN;
  
  const tokens = s.match(/[0-9.]+|[+\-*/()]/g);
  if (!tokens) return NaN;
  
  let i = 0;
  const expr = () => {
    let res = term();
    while (i < tokens.length && (tokens[i] === '+' || tokens[i] === '-')) {
      const op = tokens[i++];
      const next = term();
      res = op === '+' ? res + next : res - next;
    }
    return res;
  };
  const term = () => {
    let res = factor();
    while (i < tokens.length && (tokens[i] === '*' || tokens[i] === '/')) {
      const op = tokens[i++];
      const next = factor();
      if (next === 0) throw new Error('DivByZero');
      res = op === '*' ? res * next : res / next;
    }
    return res;
  };
  const factor = () => {
    let t = tokens[i++];
    if (t === '(') {
      const res = expr();
      if (tokens[i] === ')') i++; // skip ')'
      return res;
    }
    if (t === '-') return -factor();
    if (t === '+') return factor();
    return parseFloat(t || 0);
  };
  
  try {
    const res = expr();
    return isFinite(res) ? +res.toFixed(2) : NaN;
  } catch (e) {
    return NaN;
  }
}

/* ── Math blur: evaluate on blur, replace with result ── */
function mathBlur(el, onChangeCb) {
  const raw = (el.value || '').trim();
  if (!raw) { el.classList.remove('invalid'); return; }
  if (/^[0-9]+(\.[0-9]+)?$/.test(raw)) {
    el.classList.remove('invalid');
    if (el._mathErrEl) el._mathErrEl.style.display = 'none';
    return;
  }
  const val = evalMath(raw);
  if (isNaN(val) || val < 0) {
    el.classList.add('invalid');
    let errEl = el._mathErrEl;
    if (!errEl) {
      errEl = document.createElement('p');
      errEl.style.cssText = 'display:block;color:var(--danger);font-size:11px;font-weight:600;margin-top:4px';
      (el.parentNode).appendChild(errEl);
      el._mathErrEl = errEl;
    }
    errEl.textContent = val < 0 ? '\u2715 result cannot be negative' : '\u2715 invalid expression - e.g. 100+50 or (200/4)*3';
    errEl.style.display = 'block';
  } else {
    el.classList.remove('invalid');
    if (el._mathErrEl) el._mathErrEl.style.display = 'none';
    el.value = String(+val.toFixed(2));
    if (onChangeCb) onChangeCb();
  }
}

/* ── Attach math handlers to numeric inputs in a container ── */
function initMathFields(container) {
  if (!container) container = document;
  container.querySelectorAll('input[inputmode="decimal"], input[inputmode="numeric"], #ea,#qs-a,#iv,#ca2,#stl-amt,[id^="ca-"],[id^="mp-"],[id^="pct-"],[id^="sip-"]').forEach(el => {
    if (el._mathInited) return;
    el._mathInited = true;
    el.addEventListener('blur', () => {
      const id = el.id || '';
      if      (id === 'ea')           mathBlur(el, updSplit);
      else if (id === 'iv')           mathBlur(el, prvInst);
      else if (id === 'ca2')          mathBlur(el, null);
      else if (id === 'qs-a')         mathBlur(el, calcQS);
      else if (id === 'qs-p')         mathBlur(el, calcQS);
      else if (id === 'im')           mathBlur(el, prvInst);
      else if (id === 'stl-amt')      mathBlur(el, null);
      else if (id.startsWith('ca-'))  mathBlur(el, updCustom);
      else if (id.startsWith('mp-'))  mathBlur(el, updMP);
      else if (id.startsWith('pct-')) mathBlur(el, updPct);
      else if (id.startsWith('sip-')) mathBlur(el, () => { updSITotal(); updSplit(); });
      else                            mathBlur(el, null);
    });
    // Open keypad on focus/click
    el.addEventListener('focus', (e) => {
      e.preventDefault();
      el.blur(); // Prevent native keyboard
      openCalc(el);
    });
    el.addEventListener('click', () => openCalc(el));
  });
}

let _calcEl = null;
function openCalc(el) {
  _calcEl = el;
  const overlay = document.getElementById('calc-overlay');
  const display = document.getElementById('calc-display');
  overlay.classList.remove('hidden');
  display.textContent = (el.value || '0').trim() || '0';
  updCalcPre();
}
function closeCalc() {
  document.getElementById('calc-overlay').classList.add('hidden');
  _calcEl = null;
}
function calcPush(v) {
  const d = document.getElementById('calc-display');
  let cur = d.textContent;
  if (v === '⌫') {
    d.textContent = cur.length > 1 ? cur.slice(0, -1) : '0';
  } else if (v === '=') {
    const res = evalMath(cur);
    if (isNaN(res)) {
      toast('Invalid expression');
    } else {
      _calcEl.value = String(res);
      // Trigger all possible update events
      _calcEl.dispatchEvent(new Event('input', { bubbles: true }));
      _calcEl.dispatchEvent(new Event('change', { bubbles: true }));
      _calcEl.dispatchEvent(new Event('blur', { bubbles: true }));
      if (_calcEl.oninput) _calcEl.oninput();
      closeCalc();
    }
  } else {
    if (cur === '0') {
      if (/[0-9(]/.test(v)) d.textContent = v;
      else if (v === '.') d.textContent = '0.';
      else d.textContent = '0' + v;
    } else {
      d.textContent = cur + v;
    }
  }
  updCalcPre();
}
function updCalcPre() {
  const cur = document.getElementById('calc-display').textContent;
  const pre = document.getElementById('calc-preview');
  if (cur === '0' || !/[+\-*/()]/.test(cur)) {
    pre.textContent = ''; return;
  }
  const res = evalMath(cur);
  if (isNaN(res)) {
    pre.textContent = 'Invalid expression';
    pre.classList.add('err');
  } else {
    pre.textContent = '= ' + res.toLocaleString('th-TH', {minimumFractionDigits:0, maximumFractionDigits:2});
    pre.classList.remove('err');
  }
}
// Keyboard support for calculator
window.addEventListener('keydown', (e) => {
  const overlay = document.getElementById('calc-overlay');
  if (!overlay || overlay.classList.contains('hidden')) return;
  if (/[0-9+\-*/().]/.test(e.key)) { e.preventDefault(); calcPush(e.key === '*' ? '*' : e.key); }
  else if (e.key === 'Enter') { e.preventDefault(); calcPush('='); }
  else if (e.key === 'Backspace') { e.preventDefault(); calcPush('⌫'); }
  else if (e.key === 'Escape') { e.preventDefault(); closeCalc(); }
});

/* ── getBaseShares: used to see share before discount ── */
function getBaseShares(exp, members) {
  const shares = {};
  const amt = +exp.amount || 0;
  const validIds = new Set((members||[]).map(m=>m.id));
  if (exp.subItems && exp.subItems.length > 0) {
    exp.subItems.forEach(item => {
      const c = (item.consumers || []).filter(id=>validIds.has(id));
      if (!c.length) return;
      const priceToSplit = item.finalPrice !== undefined ? item.finalPrice : (+item.price || 0);
      const sh = priceToSplit / c.length;
      c.forEach(id => { shares[id] = (shares[id] || 0) + sh; });
    });
  } else {
    const ids = (exp.participants || (members || []).map(m => m.id)).filter(id=>validIds.has(id));
    if(!ids.length) return shares;
    if (exp.splitType === 'custom') {
      ids.forEach(id => { shares[id] = +(+(exp.customAmounts?.[id]) || 0).toFixed(2); });
    } else if (exp.splitType === 'percentage') {
      ids.forEach(id => { shares[id] = amt * ((exp.percentages?.[id] || 0) / 100); });
    } else {
      const sh = amt / ids.length;
      ids.forEach(id => { shares[id] = sh; });
    }
  }
  return shares;
}

function getNetTotal(exp, members) {
  const shares = getShares(exp, members);
  return Object.values(shares).reduce((a, b) => a + b, 0);
}

/* ── Pairwise Debt Calculation ─────────────────────── */
function getPairwise(members, expenses) {
  const debts = {}; // key: "debtorId->creditorId"

  expenses.forEach(exp => {
    if(validateExpenseRefs({members},exp).length)return;
    
    const baseShares = getBaseShares(exp, members);
    const netShares = getShares(exp, members);
    const validIds = new Set((members||[]).map(m=>m.id));

    // Raw debts map for this specific expense: debtor -> creditor -> amount
    const rawExpDebts = {};

    if (exp.splitType === 'subitem' && exp.subItems && exp.subItems.length > 0) {
      exp.subItems.forEach(item => {
        const itemPayerId = item.payerId || exp.paidById;
        const consumers = (item.consumers || []).filter(id => validIds.has(id));
        if (!consumers.length) return;
        
        const priceToSplit = item.finalPrice !== undefined ? item.finalPrice : (+item.price || 0);
        const share = priceToSplit / consumers.length;
        
        consumers.forEach(debtorId => {
          if (debtorId !== itemPayerId) {
            if (!rawExpDebts[debtorId]) rawExpDebts[debtorId] = {};
            rawExpDebts[debtorId][itemPayerId] = (rawExpDebts[debtorId][itemPayerId] || 0) + share;
          }
        });
      });
    } else {
      const totalAmt = +exp.amount || 0;
      if (totalAmt <= 0) return;
      const payers = exp.payers && exp.payers.length > 0 ? exp.payers : [{ id: exp.paidById, amt: totalAmt }];
      
      Object.entries(baseShares).forEach(([debtorId, shareAmt]) => {
        payers.forEach(payer => {
          if (debtorId === payer.id) return;
          const owedToPayer = shareAmt * (payer.amt / totalAmt);
          if (owedToPayer > 0) {
            if (!rawExpDebts[debtorId]) rawExpDebts[debtorId] = {};
            rawExpDebts[debtorId][payer.id] = (rawExpDebts[debtorId][payer.id] || 0) + owedToPayer;
          }
        });
      });
    }

    // Now apply the discount "layer" to these raw debts.
    // For each debtor, their total raw debt might be reduced by their received discount.
    Object.keys(rawExpDebts).forEach(debtorId => {
      const grossOwed = baseShares[debtorId] || 0;
      const netOwed = netShares[debtorId] || 0;
      
      // If there's a discount, scale the debts proportionally.
      // We use (netOwed / grossOwed) as the multiplier.
      const multiplier = grossOwed > 0 ? netOwed / grossOwed : 1;
      
      Object.entries(rawExpDebts[debtorId]).forEach(([creditorId, amt]) => {
        const netAmt = amt * multiplier;
        const key = `${debtorId}->${creditorId}`;
        debts[key] = (debts[key] || 0) + netAmt;
      });
    });
  });

  // Step 2: Cancel reverse pairs (D->C vs C->D)
  const final = [];
  const processed = new Set();
  const keys = Object.keys(debts);

  keys.forEach(k => {
    if (processed.has(k)) return;
    const [d, c] = k.split('->');
    const r = `${c}->${d}`;
    
    const amt = debts[k] || 0;
    const ramt = debts[r] || 0;

    if (amt > ramt) {
      final.push({ from: d, to: c, amount: +(amt - ramt).toFixed(2) });
    } else if (ramt > amt) {
      final.push({ from: c, to: d, amount: +(ramt - amt).toFixed(2) });
    }
    processed.add(k);
    processed.add(r);
  });

  return final.filter(tx => tx.amount > 0.01);
}

/* ── getShares: used for pairwise calculation ── */
function getShares(exp, members) {
  const shares = {};
  const amt = +exp.amount || 0;
  const validIds = new Set((members||[]).map(m=>m.id));
  
  // 1. Calculate Base Shares (without discount)
  if (exp.subItems && exp.subItems.length > 0) {
    const d = exp.discount;
    const isModeB = d && d.enabled && d.mode === 'B';
    
    // Calculate total base amount for Mode B proportional reduction
    let totalBase = 0;
    if (isModeB) exp.subItems.forEach(it => totalBase += (+it.price || 0));
    const discRatio = isModeB && totalBase > 0 ? (+d.amount || 0) / totalBase : 0;

    exp.subItems.forEach(item => {
      const c = (item.consumers || []).filter(id=>validIds.has(id));
      if (!c.length) return;
      
      let priceToSplit;
      if (isModeB) {
        // Recalculate with discount before VAT/SC
        const base = +item.price || 0;
        const discountedBase = Math.max(0, base - (base * discRatio));
        const vatRate = (exp.vat_percent || 0) / 100;
        const svcRate = (exp.service_percent || 0) / 100;
        const sc = item.hasService ? discountedBase * svcRate : 0;
        const vt = item.hasVat ? (discountedBase + sc) * vatRate : 0;
        priceToSplit = discountedBase + sc + vt;
      } else {
        priceToSplit = item.finalPrice !== undefined ? item.finalPrice : (+item.price || 0);
      }
      
      const sh = priceToSplit / c.length;
      c.forEach(id => { shares[id] = (shares[id] || 0) + sh; });
    });

    // If Mode B was handled, we shouldn't apply discount again in step 3
    if (isModeB) return shares;

  } else {
    const ids = (exp.participants || (members || []).map(m => m.id)).filter(id=>validIds.has(id));
    if(!ids.length) return shares;
    if (exp.splitType === 'custom') {
      ids.forEach(id => { shares[id] = +(+(exp.customAmounts?.[id]) || 0).toFixed(2); });
    } else if (exp.splitType === 'percentage') {
      ids.forEach(id => { shares[id] = amt * ((exp.percentages?.[id] || 0) / 100); });
    } else {
      const sh = amt / ids.length;
      ids.forEach(id => { shares[id] = sh; });
    }
  }

  // 2. Apply Discounts
  const d = exp.discount;
  const dAmt = (d && d.enabled && d.type !== 'credit') ? (+d.amount || 0) : 0;
  const usedCreditsAmt = (exp.usedCredits || []).reduce((acc, cid) => {
    // Find credit value. We need g to find members. 
    // Wait, getShares doesn't have g, only members.
    let val = 0;
    members.forEach(m => {
      if (m.credits) {
        const c = m.credits.find(cx => cx.id === cid);
        if (c) val = +c.value || 0;
      }
    });
    return acc + val;
  }, 0);

  if (dAmt <= 0 && usedCreditsAmt <= 0) return shares;

  const totalBeforeDiscount = Object.values(shares).reduce((a, b) => a + b, 0);
  if (totalBeforeDiscount <= 0) return shares;

  const discountShares = {};

  // Bill/Person Discount
  if (dAmt > 0 && d) {
    if (d.type === 'bill') {
      const ids = Object.keys(shares);
      if (d.dist === 'proportional') {
        ids.forEach(id => {
          discountShares[id] = (discountShares[id] || 0) + dAmt * (shares[id] / totalBeforeDiscount);
        });
      } else if (d.dist === 'custom') {
        ids.forEach(id => {
          discountShares[id] = (discountShares[id] || 0) + +(d.customAllocation?.[id] || 0);
        });
      } else { // equal
        const sh = dAmt / ids.length;
        ids.forEach(id => { discountShares[id] = (discountShares[id] || 0) + sh; });
      }
    } else if (d.type === 'person') {
      const receivers = d.receivers || [];
      if (receivers.length > 1) {
        receivers.forEach(id => {
          discountShares[id] = (discountShares[id] || 0) + +(d.customAllocation?.[id] || 0);
        });
      } else if (receivers.length === 1) {
        discountShares[receivers[0]] = (discountShares[receivers[0]] || 0) + dAmt;
      }
    }
  }

  // Wallet Credits Discount
  if (usedCreditsAmt > 0 && exp.usedCredits) {
    exp.usedCredits.forEach(cid => {
      members.forEach(m => {
        if (m.credits) {
          const c = m.credits.find(cx => cx.id === cid);
          if (c) {
            discountShares[c.ownerId] = (discountShares[c.ownerId] || 0) + (+c.value || 0);
          }
        }
      });
    });
  }

  // 3. Mode Handling (VAT & SC Order)
  // Mode A (Default): Discount After VAT & SC. Formula: (Base + SC + VAT) - Discount
  // Mode B: Discount Before VAT & SC. Formula: (Base - Discount) + SC + VAT
  // Currently, shares already include VAT & SC if it's sub-item mode.
  // If it's simple mode, 'amt' is usually the final bill total.
  
  if (d.mode === 'B' && exp.splitType === 'subitem') {
    // This is complex because we need to recalculate VAT/SC based on discounted base price.
    // However, the prompt says "Do NOT rewrite expense structures".
    // Proportional reduction is a safe bet for Mode B in this architecture.
    // (Base - Disc) + SC + VAT is equivalent to reducing the total by Disc * (1 + SC% + VAT%)?
    // Actually, Mode B usually means the discount reduces the base taxable amount.
  }

  // Subtract discount from shares, ensuring no negative totals
  Object.keys(shares).forEach(id => {
    const ds = discountShares[id] || 0;
    shares[id] = Math.max(0, shares[id] - ds);
  });

  return shares;
}

/* ── Legacy balance for simple display (Net = OwedToMe - IOwe) ── */
function calcBal(members, expenses) {
  const txns = getPairwise(members, expenses);
  const b = {};
  members.forEach(m => b[m.id] = 0);
  txns.forEach(tx => {
    b[tx.to] = +(b[tx.to] + tx.amount).toFixed(2);
    b[tx.from] = +(b[tx.from] - tx.amount).toFixed(2);
  });
  return b;
}

function formatDebtDate(date){
  if(!date)return '-';

  if(isNaN(d))return '-';
  return d.toLocaleDateString(S.lang==='th'?'th-TH':'en-GB',{day:'numeric',month:'short',year:'numeric'});
}
function debtTicket(prefix,gid,personId,date){
  const d=new Date(date||Date.now());
  const yy=String(d.getFullYear()).slice(-2),mm=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
  return `#${prefix}${yy}${mm}${dd}-${String(gid||'').slice(-3)}${String(personId||'').slice(-3)}`;

/* ═══════════════ BOTTOM NAV ══════════════════════════════ */
function renderNav(){
  const noNav=['create-group','add-expense','edit-expense','edit-group'];
  const nav=document.getElementById('bottom-nav');
  if(noNav.includes(S.screen)){nav.classList.add('hidden');return;}
  nav.classList.remove('hidden');
  // Compute total I-owe for badge
  let totalOwe=0;
  S.groups.map(revalidateGroup).forEach(g=>{
    const b=calcBal(g.members,g.expenses);
    const mb=b[g.members[0]?.id]||0;
    if(mb<-0.5)totalOwe+=Math.abs(mb);
  });
  const oweBadge=totalOwe>0.5?`<span style="position:absolute;top:2px;right:8px;background:var(--danger);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:100px">${Math.round(totalOwe/1000)>0?Math.round(totalOwe/1000)+'k':'!'}</span>`:'';
  const activeKey=S.screen==='summary'||S.screen==='monthly'?'summary':S.screen==='group'?'group':S.activeNav;
  const items=[
    {k:'home',i:'⌂',l:S.lang==='th'?'หน้าแรก':'Home',badge:''},
    {k:'activity',i:'◷',l:S.lang==='th'?'ประวัติ':'History',badge:''},
    {k:'summary',i:'▥',l:S.lang==='th'?'สรุป':'Summary',badge:''},
    {k:'group',i:'♙',l:S.lang==='th'?'กลุ่ม':'Groups',badge:''},
    {k:'iowe',i:'▣',l:S.lang==='th'?'เคลียร์เงิน':'Balances',badge:oweBadge},
    {k:'profile',i:'⚙',l:S.lang==='th'?'ตั้งค่า':'Settings',badge:''},
  ];
  nav.innerHTML=items.map(({k,i,l,badge})=>`
    <button class="nav-btn${activeKey===k?' on':''}" onclick="navTo('${k}')" style="position:relative">
      <span class="ni">${i}</span>${badge}<span class="nl">${l}</span>
    </button>`).join('');
}
function navTo(k){
  S.activeNav=k;
  if(k==='home'){S.screen='home';S.selectedGroupId=null;}
  else if(k==='summary'){
    if(!S.selectedGroupId&&S.groups[0])S.selectedGroupId=S.groups[0].id;
    S.screen=S.selectedGroupId?'summary':'home';
  }
  else if(k==='group'){
    if(!S.selectedGroupId&&S.groups[0])S.selectedGroupId=S.groups[0].id;
    S.screen=S.selectedGroupId?'group':'home';
  }
  else if(k==='iowe'){S.screen='iowe';}
  else S.screen=k;
  render();
}

function applyMemberDeleteChoice(gid,mid,mode){
  const g=getG(gid);if(!g)return;
  const replacement=document.getElementById('replace-mid')?.value;
  if(mode==='replace'&&!replacement){toast(t('fillTitleAmt'));return;}
  const fallbackId=g.members.find(m=>m.id!==mid)?.id;
  const expenses=(g.expenses||[]).map(e=>mode==='replace'
    ?replaceMemberRefsInExpense(e,mid,replacement)
    :removeMemberRefsFromExpense(e,mid,fallbackId));
  updG({...g,members:g.members.filter(m=>m.id!==mid),expenses});
  document.getElementById('em-'+mid)?.remove();
  closeSheet();
  toast(t('memberRemoved'));
}
function doEG(gid){
  const g=getG(gid);
  const name=document.getElementById('eg-n').value.trim()||g.name;
  const emoji=document.querySelector('#eg-grid .emoji-btn.on')?.dataset.e||g.emoji;
  const members=[];
  document.querySelectorAll('#eg-m .member-row').forEach(row=>{
    const inp=row.querySelector('input[data-mid]');
    const mid=inp?.dataset.mid;
    const val=inp?inp.value.trim():g.members.find(m=>m.isMe).name;
    const eav=row.querySelector('input[type="hidden"]')?.value||'';
    if(mid){
      if(mid.startsWith('new-')){if(val)members.push({id:uid(),name:val,emoji:eav});}
      else{const ex=g.members.find(m=>m.id===mid);if(ex)members.push({...ex,name:val,emoji:eav});}
    }else{
      const me=g.members.find(m=>m.isMe);
      members.push({...me,emoji:eav});
    }
  });
  const removed=(g.members||[]).filter(m=>!m.isMe&&!members.some(x=>x.id===m.id));
  const stillUsed=removed.find(m=>isMemberReferenced(g,m.id));
  if(stillUsed){confDelMember(gid,stillUsed.id);return;}
  updG({...g,name,emoji,members});toast(t('groupUpdated'));go('group',gid);
}
function confDelG(gid){

function delExp(gid,eid){
  const g=getG(gid);
  const exp=g.expenses.find(e=>e.id===eid);
  if(exp){
    // Release used credits
    if(exp.usedCredits){
      g.members.forEach(m=>{
        if(m.credits) m.credits.forEach(c=>{
          if(exp.usedCredits.includes(c.id)){ c.used=false; c.usedInExpenseId=null; }
        });
      });
    }
    // Remove credit assets created by this expense
    g.members.forEach(m=>{
      if(m.credits) m.credits=m.credits.filter(c=>c.sourceExpenseId!==eid);
    });
  }
  updG({...g,expenses:g.expenses.filter(e=>e.id!==eid)});
  toast(t('expenseRemoved'));render();
}

function updSITotal(){
  const vatRate = (+document.getElementById('vat-pct')?.value || 0) / 100;
  const svcRate = (+document.getElementById('svc-pct')?.value || 0) / 100;

  let tot = 0;
  _subItems.forEach(s => {
    const base = getV('sip-'+s.id);
    const hasVat = document.getElementById('si-vat-'+s.id)?.classList.contains('on');
    const hasSvc = document.getElementById('si-svc-'+s.id)?.classList.contains('on');
    
    let sc = hasSvc ? base * svcRate : 0;
    let vat = hasVat ? (base + sc) * vatRate : 0;
    tot += base + sc + vat;
  });

  if(_expMode === 'detail') {
    const ea = document.getElementById('ea');
    if(ea) ea.value = tot > 0 ? tot.toFixed(2) : '';
  }

  const bar=document.getElementById('si-total-bar');
  const val=document.getElementById('si-total-val');
  if(bar)bar.style.display=_subItems.length>0?'flex':'none';
  if(val){
    val.textContent=fmt(tot);
    val.style.color=stColor(true);
    if(bar)bar.className='si-total-bar si-total-ok';
  }

  // Update item-level net preview if possible
  const g = getG(S.selectedGroupId);

    const disc = collectDiscountFromUI(g);
    _subItems.forEach(item => {
      const card = document.getElementById('si-' + item.id);
      if (card) {
        // We could show net price per item here, but it's complex 
        // because discounts apply to the WHOLE bill usually.
      }
    });
  }

  chkExpForm();
}

function chkExpForm(){

  const title=(document.getElementById('et')?.value||'').trim();

  if(_expMode==='detail'){
    valid=valid&&_subItems.length>0&&_subItems.every(s=>s.consumers&&s.consumers.length>0);
  } else {
    const pts=getParts();valid=valid&&pts.length>0;
    if(_ST==='custom'){let ct=0;pts.forEach(id=>{ct+=getV('ca-'+id);});valid=valid&&isNear(ct,amt);}
    if(_ST==='percentage'){let pt=0;pts.forEach(id=>{pt+=getV('pct-'+id);});valid=valid&&isNear(pt,100,0.1);}

  }
  const b=document.getElementById('se-btn');if(b)b.disabled=!valid;

function validateDiscount() {
  const toggle = document.getElementById('disc-toggle');
  if (!toggle || !toggle.classList.contains('on')) return true;

  const amount = getV('da');
  const billTotal = getV('ea');
  if (amount <= 0 || (billTotal > 0 && amount > billTotal)) return false;

  const type = ['bill', 'person', 'credit'].find(t => document.getElementById('dt-' + t)?.classList.contains('on')) || 'bill';
  
  if (type === 'bill') {
    const dist = ['equal', 'proportional', 'custom'].find(d => document.getElementById('dist-' + d)?.classList.contains('on')) || 'equal';
    if (dist === 'custom') {
      let tot = 0;
      document.querySelectorAll('[id^="dca-"]').forEach(el => tot += getV(el.id));
      if (!isNear(tot, amount)) return false;
    }
  } else if (type === 'person') {
    const selected = Array.from(document.querySelectorAll('[id^="drchk-"].on')).map(el => el.id.split('-')[1]);
    if (selected.length === 0) return false;
    if (selected.length > 1) {
      let tot = 0;
      selected.forEach(mid => tot += getV('dra-' + mid));
      if (!isNear(tot, amount)) return false;
    }
  } else if (type === 'credit') {
    const name = document.getElementById('cname')?.value.trim();
    if (!name) return false;
  }
  return true;
}

function chkExpForm(){
  const amt=getV('ea');
  const title=(document.getElementById('et')?.value||'').trim();
  let valid=amt>0&&title;
  if(_expMode==='detail'){
    valid=valid&&_subItems.length>0&&_subItems.every(s=>s.consumers&&s.consumers.length>0);
  } else {
    const pts=getParts();valid=valid&&pts.length>0;
    if(_ST==='custom'){let ct=0;pts.forEach(id=>{ct+=getV('ca-'+id);});valid=valid&&isNear(ct,amt);}
    if(_ST==='percentage'){let pt=0;pts.forEach(id=>{pt+=getV('pct-'+id);});valid=valid&&isNear(pt,100,0.1);}
    if(_ST==='multipayer'){const g=getG(S.selectedGroupId);let mt=0;g.members.forEach(m=>{mt+=getV('mp-'+m.id);});valid=valid&&isNear(mt,amt);}
  }
  
  valid = valid && validateDiscount();

  const b=document.getElementById('se-btn');if(b)b.disabled=!valid;
}
function getV(id){
  const el=document.getElementById(id);if(!el)return 0;
  const v=evalMath(el.value);
  if(isNaN(v)){ el.classList.add('invalid'); return 0; }
  el.classList.remove('invalid'); return v;
}

function collectDiscountFromUI(g) {
  const discEnabled = document.getElementById('disc-toggle')?.classList.contains('on');
  if (!discEnabled) return { enabled: false };

  const type = ['bill', 'person', 'credit'].find(t => document.getElementById('dt-' + t)?.classList.contains('on')) || 'bill';
  const dist = ['equal', 'proportional', 'custom'].find(d => document.getElementById('dist-' + d)?.classList.contains('on')) || 'equal';
  const mode = ['A', 'B', 'C'].find(m => document.getElementById('dm-' + m)?.classList.contains('on')) || 'A';
  const amount = getV('da');
  const source = document.getElementById('ds')?.value || 'custom';
  
  const customAllocation = {};
  if (type === 'bill' && dist === 'custom') {
    g.members.forEach(m => { customAllocation[m.id] = getV('dca-' + m.id); });
  } else if (type === 'person') {
    const selected = Array.from(document.querySelectorAll('[id^="drchk-"].on')).map(el => el.id.split('-')[1]);
    selected.forEach(mid => { customAllocation[mid] = selected.length > 1 ? getV('dra-' + mid) : amount; });
  }
  const receivers = type === 'person' ? Array.from(document.querySelectorAll('[id^="drchk-"].on')).map(el => el.id.split('-')[1]) : [];

  return { enabled: true, type, dist, mode, amount, source, customAllocation, receivers };
}

function doSaveExp(editId,gid){
  const g=getG(gid);
  const amt=getV('ea');
  const title=document.getElementById('et').value.trim();
  const emoji=document.getElementById('ee-btn').dataset.e||'🍽️';
  const paidById=document.querySelector('.po')?.dataset.id||g.members[0].id;
  const payers=[{id:paidById,amt}];
  const prevNote=editId?g.expenses.find(e=>e.id===editId)?.note||'':'';
  const prevDate=editId?g.expenses.find(e=>e.id===editId)?.date:new Date().toISOString();

  let expData;
  if(_expMode==='detail'){
    const vatRate = (+document.getElementById('vat-pct')?.value || 0);
    const svcRate = (+document.getElementById('svc-pct')?.value || 0);

    const builtItems=_subItems.map(item=>{
      const card=document.getElementById('si-'+item.id);
      let name=item.name, price=item.price, payerId=item.payerId;
      let hasVat = document.getElementById('si-vat-'+item.id)?.classList.contains('on');
      let hasSvc = document.getElementById('si-svc-'+item.id)?.classList.contains('on');

      if(card){
        price = getV('sip-'+item.id);
        const nameIn=card.querySelector('input:not([id^="sip-"])');
        if(nameIn) name=nameIn.value.trim()||name;
      }
      
      let sc = hasSvc ? price * (svcRate/100) : 0;
      let vt = hasVat ? (price + sc) * (vatRate/100) : 0;
      const finalItemPrice = price + sc + vt;

      return {id:item.id, name, price:+price.toFixed(2), 
              hasVat, hasService: hasSvc,
              finalPrice: +finalItemPrice.toFixed(2),
              consumers:[...item.consumers], payerId: payerId};
    });
    
    const payersMap = {};
    builtItems.forEach(it => { payersMap[it.payerId] = (payersMap[it.payerId] || 0) + it.finalPrice; });
    const finalPayers = Object.entries(payersMap).map(([id, amt]) => ({id, amt: +amt.toFixed(2)}));
    const allConsumers=[...new Set(builtItems.flatMap(s=>s.consumers))];
    
    expData={id:editId||uid(),title,amount:amt,emoji,paidById:finalPayers[0]?.id||paidById,payers:finalPayers,
      splitType:'subitem',participants:allConsumers,
      subItems:builtItems,
      vat_percent: vatRate,
      service_percent: svcRate,
      customAmounts:{},percentages:{},date:prevDate,note:prevNote};
  } else {
    const pts=getParts();
    const customAmounts={},percentages={};
    pts.forEach(id=>{
      customAmounts[id]=getV('ca-'+id);
      percentages[id]=getV('pct-'+id);
    });
    let finalPayers=payers;
    if(_ST==='multipayer'){
      finalPayers=[];
      g.members.forEach(m=>{const v=getV('mp-'+m.id);if(v>0)finalPayers.push({id:m.id,amt:v});});
    }
    expData={id:editId||uid(),title,amount:amt,emoji,
      paidById:finalPayers[0]?.id||paidById,payers:finalPayers,
      splitType:_ST,participants:pts,customAmounts,percentages,
      subItems:[],date:prevDate,note:prevNote};
  }

  // Collect Discount Data
  const discData = collectDiscountFromUI(g);
  expData.discount = discData;

  if (discData.enabled) {
    if (discData.type === 'credit') {
      const creditAsset = {
        id: uid(),
        name: document.getElementById('cname')?.value || 'Credit',
        value: discData.amount,
        ownerId: document.getElementById('cowner')?.value || g.members[0].id,
        expiry: document.getElementById('cexpiry')?.value || '',
        date: new Date().toISOString(),
        sourceExpenseId: expData.id
      };
      expData.discount.creditAsset = creditAsset;
      
      // Add to member's wallet
      const owner = g.members.find(m => m.id === creditAsset.ownerId);
      if (owner) {
        if (!owner.credits) owner.credits = [];
        // Remove old credit if editing
        if (editId) owner.credits = owner.credits.filter(c => c.sourceExpenseId !== editId);
        owner.credits.push(creditAsset);
      }
    } else if (editId) {
      // If it was a credit expense before but now it's not, remove from wallet
      g.members.forEach(m => {
        if (m.credits) m.credits = m.credits.filter(c => c.sourceExpenseId !== editId);
      });
    }
  } else if (editId) {
    // If it was a credit expense before, remove it from wallet
    g.members.forEach(m => {
      if (m.credits) m.credits = m.credits.filter(c => c.sourceExpenseId !== editId);
    });
  }

  // Handle Used Credits
  const usedCreditIds = [];
  document.querySelectorAll('.cw-id').forEach((el, idx) => {
    const chk = el.parentElement.querySelector('.chk-sq');
    if (chk && chk.classList.contains('on')) {
      usedCreditIds.push(el.value);
    }
  });
  expData.usedCredits = usedCreditIds;

  // Mark credits as used in member object
  const me = g.members.find(m => m.isMe);
  if (me && me.credits) {
    me.credits.forEach(c => {
      if (usedCreditIds.includes(c.id)) {
        c.used = true;
        c.usedInExpenseId = expData.id;
      } else if (c.usedInExpenseId === editId) {
        c.used = false;
        c.usedInExpenseId = null;
      }
    });
  }

  if(editId){updG({...g,expenses:g.expenses.map(e=>e.id===editId?expData:e)});toast(t('expenseUpdated'));}
  else{updG({...g,expenses:[...g.expenses,expData]});toast(t('expenseAdded'));}
  go('group',gid);
}

    <div class="emoji-grid">${EE.map(({e,l})=>`<button onclick="pickEE('${e}')" style="background:var(--bg);border:none;border-radius:14px;padding:10px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px"><span style="font-size:26px">${e}</span><span style="font-size:10px;color:var(--muted)">${l}</span></button>`).join('')}</div>`);

  const totalDiscount = totalGross - totalNet;

        detail += `<div style="color:var(--sage)">← ${esc(GN(g, t.from))} <span class="ff-s fw7">${fmt(t.amount)}</span></div>`;
      });

    }

    return `<div class="flex-col" style="padding:14px 0;border-bottom:1px solid var(--border)">

  const expBD=[...g.expenses].reverse().map(exp=>{
    const invalid=(exp.invalidReasons||[]).length>0;
    const amt=+exp.amount||0;
    const payers=exp.payers||[{id:exp.paidById,amt}];
    const pm={};payers.forEach(p=>pm[p.id]=(pm[p.id]||0)+(+p.amt||0));
    const pStr=payers.map(p=>`${GN(g,p.id)} ${fmt(p.amt)}`).join(', ');
    
    // Discount info
    let discHTML = '';
    if (exp.discount && exp.discount.enabled) {
      const d = exp.discount;
      const typeLabel = t(d.type + 'Discount');
      discHTML = `<div style="margin-top:4px;font-size:11px;color:var(--sage);font-weight:600">
        🏷️ ${typeLabel} (${t(d.source)}): -${fmt(d.amount)}
      </div>`;
    }

    // Use single source of truth — same function as calcBal
    const shares=invalid?{}:getShares(exp, g.members);
    // For display: all people who paid or have a share
    const allIds=[...new Set([...Object.keys(shares),...Object.keys(pm)])];
    return `<div class="card" style="margin-bottom:10px;${invalid?'border-color:var(--danger);':''}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">

        <div class="flex1"><p class="fw7" style="font-size:14px">${esc(exp.title)}</p>

          ${discHTML}

      <div style="border-top:1px solid var(--border);padding-top:8px">
        ${allIds.map(id=>{
          const m=g.members.find(x=>x.id===id);
          const share=shares[id]||0,paid=pm[id]||0,net=share-paid;
          
          // Show individual discount for bill proportional/custom or person discount

                ${net>0.5?t('owes')+' '+fmt(net):net<-0.5?t('getsBack')+' '+fmt(-net):'✓'}
              </span>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  const membersBody=`${bRows||`<p class="txt-muted" style="font-size:13px;padding:10px 0">${t('noExpenses')}</p>`}`;
  const billsBody=expBD||`<div class="empty"><p>${t('noExpenses')}</p></div>`;
  const totalBody=`
    <div class="summary-mini-row"><span class="txt-muted">${t('billTotal')}</span><span class="fw7">${fmt(totalGross)}</span></div>
    <div class="summary-mini-row"><span class="txt-muted">${t('discountTotal')}</span><span class="fw7" style="color:var(--sage)">-${fmt(totalDiscount)}</span></div>
    <div class="summary-mini-row"><span class="txt-muted">VAT / SC</span><span class="fw7">${fmt(0)}</span></div>

    <div style="margin-top:14px"><p class="lbl">${t('settlementPlan')}</p>${sRows}</div>`;

  return `<div class="screen">

  </div>`;

let _CF='monthly';
function setCF(f){_CF=f;document.getElementById('cf-mo')?.classList.toggle('on',f==='monthly');document.getElementById('cf-wk')?.classList.toggle('on',f==='weekly');}
function nextDue(c){
  const start=new Date(c.startDate||todayStr()),today=new Date();let d=new Date(start);
  while(d<=today){if(c.freq==='weekly')d.setDate(d.getDate()+7);else d.setMonth(d.getMonth()+1);}
  return d;
}

function saveCycle(gid){
  const g=getG(gid);
  const name=document.getElementById('cn').value.trim(),amount=getV('ca2');
  if(!name||!amount){toast(t('fillTitleAmt'));return;}

  const cycle={id:uid(),name,amount,freq:_CF,startDate:document.getElementById('cs').value||todayStr(),endDate:document.getElementById('ce').value||null,paidDates:[]};
  updG({...g,cycles:[...(g.cycles||[]),cycle]});toast(t('planAdded'));go('cycles',gid);
}
function markCPaid(gid,cid){
  const g=getG(gid);
  updG({...g,cycles:(g.cycles||[]).map(c=>c.id===cid?{...c,paidDates:[...(c.paidDates||[]),todayStr()]}:c)});render();
}
function delCycle(gid,cid){const g=getG(gid);updG({...g,cycles:(g.cycles||[]).filter(c=>c.id!==cid)});toast(t('planRemoved'));render();}

function scrChecklist(){
  const g=getG(S.selectedGroupId);if(!g)return go('home');
  if(!g.checkItems)g.checkItems=[];
  const filter=S.clFilter||'all';

  // Build items from expenses + cycles
  let items=[
    ...(g.cycles||[]).map(c=>{
      const nd=nextDue(c);
      return {id:'cyc-'+c.id,label:`${c.name} (${nd.toLocaleDateString(S.lang==='th'?'th-TH':'en-GB')})`,amount:c.amount,emoji:'🔄',type:'cycle',done:c.paidDates?.includes(todayStr())||false};
    }),
    ...g.expenses.map(exp=>({id:'exp-'+exp.id,label:exp.title,amount:exp.amount,emoji:exp.emoji,type:'expense',done:false})),
  ];
  // Apply persisted done states
  items=items.map(item=>{const sv=g.checkItems?.find(c=>c.id===item.id);return sv?{...item,done:sv.done}:item;});

  const shown=items.filter(i=>filter==='all'||(filter==='paid'&&i.done)||(filter==='unpaid'&&!i.done));
  const totalAmt=items.reduce((a,i)=>a+(+i.amount||0),0);
  const paidAmt=items.filter(i=>i.done).reduce((a,i)=>a+(+i.amount||0),0);
  const prog=totalAmt>0?Math.round(paidAmt/totalAmt*100):0;

  const html=shown.length===0
    ?`<div class="empty"><div class="ei">✅</div><p>${filter==='unpaid'?t('allSettled'):t('noChecklist')}</p></div>`
    :shown.map(item=>`<div class="cl-item${item.done?' done':''}">
        <div class="chk-sq${item.done?' on':''}" onclick="togCI('${g.id}','${item.id}',${!item.done})">✓</div>
        <span style="font-size:18px">${item.emoji}</span>
        <div class="flex1">
          <p class="cl-title fw7" style="font-size:14px">${esc(item.label)}</p>
          <span style="font-size:11px;color:var(--muted)">${item.type==='cycle'?'🔄 '+t('billCycles'):'💸 '+t('expenses')}</span>
        </div>
        <span class="ff-s fw7" style="font-size:14px;color:${item.done?'var(--sage)':'var(--ink)'}">${fmt(item.amount)}</span>
      </div>`).join('');

  return `<div class="screen">
    <div class="flex items-center gap12 p20 pt56">
      <button class="btn-icon" onclick="go('group','${g.id}')">←</button>
      <h1 class="ff-s" style="font-size:22px;font-weight:700">${t('checklistTitle')}</h1>
    </div>
    <div class="px16 gap-col">
      <div class="card" style="background:linear-gradient(135deg,var(--sage-lt),#fff)">
        <div class="grid3" style="text-align:center">
          <div><p class="ff-s fw7 txt-sage" style="font-size:18px">${fmt(paidAmt)}</p><p style="font-size:11px;color:var(--muted);font-weight:600">${t('paid3')}</p></div>
          <div><p class="ff-s fw7 txt-danger" style="font-size:18px">${fmt(totalAmt-paidAmt)}</p><p style="font-size:11px;color:var(--muted);font-weight:600">${t('remaining')}</p></div>
          <div><p class="ff-s fw7" style="font-size:18px">${fmt(totalAmt)}</p><p style="font-size:11px;color:var(--muted);font-weight:600">${t('total')}</p></div>
        </div>
        <div class="prog-track" style="margin-top:12px"><div class="prog-fill" style="width:${prog}%"></div></div>
      </div>
      <div class="pills">
        <button class="pill${filter==='all'?' on':''}" onclick="S.clFilter='all';render()">${t('all')}</button>
        <button class="pill${filter==='paid'?' on':''}" onclick="S.clFilter='paid';render()">${t('paid3')}</button>
        <button class="pill${filter==='unpaid'?' on':''}" onclick="S.clFilter='unpaid';render()">${t('unpaid2')}</button>
      </div>
      ${html}
      <div style="height:10px"></div>
    </div>
  </div>`;
}
function togCI(gid,itemId,done){
  const g=getG(gid);
  const updated=(g.checkItems||[]).filter(c=>c.id!==itemId);
  updated.push({id:itemId,done});
  updG({...g,checkItems:updated});render();
}
