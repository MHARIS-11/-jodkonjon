/* ═══════════════════════════════════════════════════════════
   SPORT SPLIT
═══════════════════════════════════════════════════════════ */
const SPORT_EMOJIS=['🔵','🟡','🔴','⚪','🟢','🟣','🟠','⚫','🏆','⭐','🔥','💎'];
const SPORT_COLORS=['#3B82F6','#F5A623','#FF3B5C','#EDEAE4','#4CAF7D','#8B5CF6','#FF8A3D','#1A1A2E','#D97706','#FACC15','#F97316','#06B6D4'];
let _sportMode='list',_sportEditId=null,_sportViewId=null,_sportDraft=null;
function sportCopyText(th,en){return S.lang==='th'?th:en;}
function sportDefaultTeam(i=0){return {id:uid(),name:`${sportCopyText('ทีม','Team')} ${i+1}`,emoji:SPORT_EMOJIS[i%SPORT_EMOJIS.length],color:SPORT_COLORS[i%SPORT_COLORS.length],memberCount:1,teamCost:0,costPerPerson:null};}
function sportDefaultDraft(){
  return {id:uid(),name:sportCopyText('บอลเย็นนี้','Evening match'),date:todayStr(),venue:'',totalCost:0,costMode:'auto',teams:[sportDefaultTeam(0),sportDefaultTeam(1)],note:'',createdAt:new Date().toISOString()};
}
function sportClone(x){return JSON.parse(JSON.stringify(x));}
function sportNormalize(draft){
  const total=Math.max(0,+draft.totalCost||0);
  const teams=(draft.teams&&draft.teams.length?draft.teams:[sportDefaultTeam(0)]).map((tm,i)=>({
    id:tm.id||uid(),
    name:(tm.name||`${sportCopyText('ทีม','Team')} ${i+1}`).trim(),
    emoji:tm.emoji||SPORT_EMOJIS[i%SPORT_EMOJIS.length],
    color:tm.color||SPORT_COLORS[i%SPORT_COLORS.length],
    memberCount:Math.max(0,Math.floor(+tm.memberCount||0)),
    teamCost:Math.max(0,+tm.teamCost||0),
    costPerPerson:null
  }));
  if(draft.costMode==='auto'){
    const each=teams.length?total/teams.length:0;
    teams.forEach(tm=>tm.teamCost=+each.toFixed(2));
  }
  teams.forEach(tm=>tm.costPerPerson=tm.memberCount>0?Math.ceil((+tm.teamCost||0)/tm.memberCount):null);
  return {
    id:draft.id||uid(),
    name:(draft.name||sportCopyText('หารกีฬา','Sport split')).trim(),
    date:draft.date||todayStr(),
    venue:(draft.venue||'').trim(),
    totalCost:total,
    costMode:draft.costMode==='manual'?'manual':'auto',
    teams,
    note:(draft.note||'').trim(),
    createdAt:draft.createdAt||new Date().toISOString()
  };
}
function sportManualSum(draft){return (draft.teams||[]).reduce((a,t)=>a+(+t.teamCost||0),0);}
function sportStartNew(){_sportMode='form';_sportEditId=null;_sportViewId=null;_sportDraft=sportDefaultDraft();render();}
function sportEdit(id){const s=S.sportSessions.find(x=>x.id===id);if(!s)return;_sportMode='form';_sportEditId=id;_sportViewId=null;_sportDraft=sportClone(s);render();}
function sportView(id){_sportMode='result';_sportViewId=id;_sportEditId=null;_sportDraft=null;render();}
function sportBackList(){_sportMode='list';_sportEditId=null;_sportViewId=null;_sportDraft=null;render();}
function sportSet(k,v){
  if(!_sportDraft)return;
  if(k==='totalCost')_sportDraft[k]=Math.max(0,+v||0);
  else _sportDraft[k]=v;
  sportRefreshPreview();
}
function sportSetMode(mode){if(!_sportDraft)return;_sportDraft.costMode=mode;render();}
function sportSetTeam(i,k,v){
  if(!_sportDraft||!_sportDraft.teams[i])return;
  if(k==='memberCount')_sportDraft.teams[i][k]=Math.max(0,Math.floor(+v||0));
  else if(k==='teamCost')_sportDraft.teams[i][k]=Math.max(0,+v||0);
  else _sportDraft.teams[i][k]=v;
  sportRefreshPreview();
}
function sportPickEmoji(i,emoji){
  if(!_sportDraft||!_sportDraft.teams[i])return;
  _sportDraft.teams[i].emoji=emoji;
  _sportDraft.teams[i].color=SPORT_COLORS[Math.max(0,SPORT_EMOJIS.indexOf(emoji))%SPORT_COLORS.length];
  render();
}
function sportAddTeam(){if(!_sportDraft)return;_sportDraft.teams.push(sportDefaultTeam(_sportDraft.teams.length));render();}
function sportRemoveTeam(i){if(!_sportDraft||_sportDraft.teams.length<=1)return;_sportDraft.teams.splice(i,1);render();}
function sportRefreshPreview(){
  if(!_sportDraft)return;
  const n=sportNormalize(_sportDraft);
  n.teams.forEach((tm,i)=>{
    const cost=document.getElementById(`sport-cost-${i}`);
    const pp=document.getElementById(`sport-pp-${i}`);
    if(cost)cost.textContent=fmt(tm.teamCost);
    if(pp)pp.textContent=tm.costPerPerson===null?'-':fmt(tm.costPerPerson);
  });
  const warn=document.getElementById('sport-manual-warn');
  if(warn){
    const diff=Math.abs(sportManualSum(_sportDraft)-(+_sportDraft.totalCost||0));
    warn.style.display=_sportDraft.costMode==='manual'&&diff>0.5?'block':'none';
  }
}
function sportSave(){
  if(!_sportDraft)return;
  const data=sportNormalize(_sportDraft);
  if(!data.name){toast(sportCopyText('ใส่ชื่อกิจกรรมก่อน','Add a session name first'));return;}
  if(!data.totalCost){toast(sportCopyText('ใส่ค่าใช้จ่ายรวมก่อน','Add total cost first'));return;}
  if(data.teams.some(t=>!t.name)){toast(sportCopyText('ใส่ชื่อทีมให้ครบ','Name every team'));return;}
  if(_sportEditId)S.sportSessions=S.sportSessions.map(s=>s.id===_sportEditId?data:s);
  else S.sportSessions=[data,...(S.sportSessions||[])];
  saveSportSessions();toast(sportCopyText('บันทึกหารกีฬาแล้ว','Sport split saved'));sportView(data.id);
}
function sportDelete(id){
  if(!confirm(sportCopyText('ลบรายการหารกีฬานี้?','Delete this sport split?')))return;
  S.sportSessions=(S.sportSessions||[]).filter(s=>s.id!==id);
  saveSportSessions();toast(sportCopyText('ลบแล้ว','Deleted'));sportBackList();
}
function sportSummaryText(s){
  const lines=[
    `⚽ ${s.name}`,
    `${sportCopyText('วันที่','Date')}: ${new Date(s.date).toLocaleDateString(S.lang==='th'?'th-TH':'en-GB')}${s.venue?' · '+s.venue:''}`,
    `${sportCopyText('ค่าใช้จ่ายรวม','Total')}: ${fmt(s.totalCost)}`,
    ''
  ];
  s.teams.forEach(tm=>lines.push(`${tm.emoji} ${tm.name}: ${fmt(tm.teamCost)} / ${tm.memberCount||0} ${sportCopyText('คน','people')} = ${tm.costPerPerson===null?'-':fmt(tm.costPerPerson)} ${sportCopyText('ต่อคน','per person')}`));
  if(s.note)lines.push('',`${sportCopyText('หมายเหตุ','Note')}: ${s.note}`);
  return lines.join('\n');
}
function sportCopySummary(id){
  const s=S.sportSessions.find(x=>x.id===id);if(!s)return;
  const txt=sportSummaryText(s);
  if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>toast(t('copySuccess'))).catch(()=>toast(txt));
  else toast(txt);
}
function sportModePill(mode,label){
  return `<button class="pill${_sportDraft?.costMode===mode?' on':''}" onclick="sportSetMode('${mode}')">${label}</button>`;
}
function scrSportForm(){
  if(!_sportDraft)_sportDraft=sportDefaultDraft();
  const preview=sportNormalize(_sportDraft);
  const teamRows=_sportDraft.teams.map((tm,i)=>{
    const pv=preview.teams[i]||sportDefaultTeam(i);

/* ═══════════════════════════════════════════════════════════
   MONTHLY SUMMARY — expenses + cycles + installments
═══════════════════════════════════════════════════════════ */
function scrMonthlySummary(){
  const g=getG(S.selectedGroupId);if(!g)return go('home');
  const now=new Date();
  const mo=now.getMonth(),yr=now.getFullYear();
  const moLabel=now.toLocaleDateString(S.lang==='th'?'th-TH':'en-GB',{month:'long',year:'numeric'});
  const nm=g.members.length;

  // 1) One-time expenses this month
  const oneTime=g.expenses.filter(e=>{
    const d=new Date(e.date);return d.getMonth()===mo&&d.getFullYear()===yr;
  });
  const oneTimeTotal=oneTime.reduce((a,e)=>a+(+e.amount||0),0);

  // 2) Bill cycles — amount due this month
  const cyclesThisMonth=(g.cycles||[]).filter(c=>{
    const start=new Date(c.startDate||todayStr());
    const end=c.endDate?new Date(c.endDate):null;
    if(start>new Date(yr,mo+1,0))return false;
    if(end&&end<new Date(yr,mo,1))return false;
    return true;
  });
  const cyclesTotal=cyclesThisMonth.reduce((a,c)=>a+(+c.amount||0),0);

  // 3) Installments — monthly payment due
  const instThisMonth=(g.installments||[]).filter(p=>p.paidMonths<p.numMonths);
  const instTotal=instThisMonth.reduce((a,p)=>a+(p.totalAmt/p.numMonths),0);

  const grandTotal=oneTimeTotal+cyclesTotal+instTotal;
  const perPerson=nm>0?grandTotal/nm:0;

  // Spending chart data — last 6 months
  const chartData=[];
  for(let i=5;i>=0;i--){
    const d=new Date(yr,mo-i,1);
    const mm=d.getMonth(),yy=d.getFullYear();
    const tot=g.expenses.filter(e=>{const ed=new Date(e.date);return ed.getMonth()===mm&&ed.getFullYear()===yy;})
      .reduce((a,e)=>a+(+e.amount||0),0);
    chartData.push({label:d.toLocaleDateString(S.lang==='th'?'th-TH':'en-GB',{month:'short'}),val:tot});
  }
  const maxVal=Math.max(...chartData.map(d=>d.val),1);

  // SVG bar chart
  const W=340,H=110,BAR_W=32,GAP=(W-6*BAR_W)/7;
  const bars=chartData.map((d,i)=>{
    const bh=Math.max(4,Math.round((d.val/maxVal)*(H-30)));
    const x=GAP+(BAR_W+GAP)*i;const y=H-20-bh;
    const isNow=i===5;
    return `<rect x="${x}" y="${H-20}" width="${BAR_W}" height="0" rx="6" class="chart-bar-bg"/>
      <rect x="${x}" y="${y}" width="${BAR_W}" height="${bh}" rx="6" fill="${isNow?'var(--accent)':'var(--accent-soft)'}"/>
      <text x="${x+BAR_W/2}" y="${H-4}" class="chart-label">${d.label}</text>
      ${d.val>0?`<text x="${x+BAR_W/2}" y="${y-4}" class="chart-val">${d.val>=1000?Math.round(d.val/1000)+'k':Math.round(d.val)}</text>`:''}`;
  }).join('');

  const oneTimeRows=oneTime.length===0
    ?`<p class="txt-muted" style="font-size:13px;padding:8px 0">${t('noExpenses')}</p>`
    :oneTime.map(e=>`<div class="mo-row">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:16px">${e.emoji}</span>
          <span style="font-size:13px;font-weight:600">${esc(e.title)}</span>
        </div>
        <span class="ff-s fw7" style="font-size:14px">${fmt(e.amount)}</span>
      </div>`).join('');

  const cycleRows=cyclesThisMonth.length===0
    ?`<p class="txt-muted" style="font-size:13px;padding:8px 0">${t('noCycles')}</p>`
    :cyclesThisMonth.map(c=>`<div class="mo-row">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:16px">🔄</span>
          <div>
            <span style="font-size:13px;font-weight:600">${esc(c.name)}</span>
            <span class="cycle-badge ${c.freq==='weekly'?'cycle-weekly':'cycle-monthly'}" style="margin-left:6px">${c.freq==='weekly'?t('weekly'):t('monthly')}</span>
          </div>
        </div>
        <span class="ff-s fw7" style="font-size:14px">${fmt(c.amount)}</span>
      </div>`).join('');

  const instRows=instThisMonth.length===0
    ?`<p class="txt-muted" style="font-size:13px;padding:8px 0">${t('noInstallYet')}</p>`
    :instThisMonth.map(p=>{
        const ppmo=p.totalAmt/p.numMonths;
        const rem=p.numMonths-p.paidMonths;
        return `<div class="mo-row">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:16px">📅</span>
            <div>
              <span style="font-size:13px;font-weight:600">${esc(p.title)}</span>
              <p style="font-size:11px;color:var(--muted)">${rem} ${t('monthsLeft')}</p>
            </div>
          </div>
          <span class="ff-s fw7" style="font-size:14px">${fmt(ppmo)}</span>
        </div>`;
      }).join('');

  return `<div class="screen">
    <div class="flex items-center gap12 p20 pt56">
      <button class="btn-icon" onclick="go('group','${g.id}')">←</button>
      <div>
        <h1 class="ff-s" style="font-size:22px;font-weight:700">${t('monthlySummary')}</h1>
        <p class="txt-muted" style="font-size:13px">${moLabel} · ${esc(g.name)}</p>
      </div>
    </div>
    <div class="px16 gap-col">

      <!-- Grand total banner -->
      <div class="mo-total">
        <div>
          <p style="color:rgba(255,255,255,.55);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">${t('grandTotal')}</p>
          <p class="fs-big" style="color:#fff">${fmt(grandTotal)}</p>
          <p style="color:rgba(255,255,255,.45);font-size:12px;margin-top:4px">${t('perPersonTotal')}: <strong style="color:#fff">${fmt(perPerson)}</strong></p>
        </div>
        <div style="text-align:right">
          ${[
            {l:t('oneTimeExp'),v:oneTimeTotal,c:'var(--accent-soft)'},
            {l:t('recurringBills'),v:cyclesTotal,c:'var(--blue-lt)'},
            {l:t('installmentsDue'),v:instTotal,c:'var(--gold-lt)'},
          ].map(({l,v,c})=>`<div style="margin-bottom:6px">
            <span style="font-size:10px;color:rgba(255,255,255,.5);font-weight:600">${l}</span>
            <p style="font-family:'Fraunces',serif;font-weight:700;font-size:16px;color:#fff">${fmt(v)}</p>
          </div>`).join('')}
        </div>
      </div>

      <!-- Spending Chart -->
      <div class="chart-wrap">
        <p class="lbl">${t('spendingChart')} — ${t('last6months')}</p>
        ${maxVal>1?`<svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible">${bars}</svg>`
          :`<p class="txt-muted" style="font-size:13px;text-align:center;padding:20px 0">${t('noChartData')}</p>`}
      </div>

      ${summaryCollapseSection('mo-one','▤',t('oneTimeExp'),fmt(oneTimeTotal),oneTimeRows,false)}
      ${summaryCollapseSection('mo-cycles','↻',t('recurringBills'),fmt(cyclesTotal),cycleRows,false)}
      ${summaryCollapseSection('mo-inst','▣',t('installmentsDue'),fmt(instTotal),instRows,false)}

      <div style="height:10px"></div>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════
   I OWE / I AM OWED — Cross-group dashboard
═══════════════════════════════════════════════════════════ */
function scrIOwe(){
  // Compute all debts & credits across every group
  const iOweList=[],iAmOwedList=[];
  S.groups.forEach(g=>{
    const myId=g.members[0]?.id;if(!myId)return;
    const txns=getPairwise(g.members,g.expenses);
    const latestDate=(g.expenses||[]).reduce((latest,e)=>{
      const d=new Date(e.date||0).getTime();
      return d>(latest||0)?d:latest;
    },0);
    // I owe: transactions where from===myId
    txns.filter(tx=>tx.from===myId).forEach(tx=>{
      const target=g.members.find(m=>m.id===tx.to);
      iOweList.push({gid:g.id,gname:g.name,gemoji:g.emoji,toId:tx.to,toName:GN(g,tx.to),toM:target,amount:tx.amount,latestDate});
    });
    // I am owed: transactions where to===myId
    txns.filter(tx=>tx.to===myId).forEach(tx=>{
      const target=g.members.find(m=>m.id===tx.from);
      iAmOwedList.push({gid:g.id,gname:g.name,gemoji:g.emoji,fromId:tx.from,fromName:GN(g,tx.from),fromM:target,amount:tx.amount,latestDate});
    });
  });

  const totalIOwe=iOweList.reduce((a,x)=>a+x.amount,0);
  const totalOwed=iAmOwedList.reduce((a,x)=>a+x.amount,0);
  const pendingLabel=S.lang==='th'?'รอเคลียร์':'Pending';
  const amountLabel=S.lang==='th'?'ยอดค้าง':'Amount';
  const dateLabel=S.lang==='th'?'วันที่สร้างรายการ':'Created date';
  const groupLabel=S.lang==='th'?'กลุ่ม':'Group';
  const noteLabel=S.lang==='th'?'หมายเหตุ':'Note';
  const ticketLabel=S.lang==='th'?'เลขที่รายการ':'Ticket';
  const openGroupLabel=S.lang==='th'?'เปิดกลุ่ม':'Open group';
  const remindLabel=S.lang==='th'?'ทวงเงิน':'Remind';
  const payLabel=S.lang==='th'?'ชำระเงิน':'Pay';

  const debtRow=(x,type)=>{
    const isPay=type==='pay';
    const rowKey=`${type}_${x.gid}_${isPay?x.toId:x.fromId}`;
    const personName=isPay?x.toName:x.fromName;
    const person=isPay?x.toM:x.fromM;
    const pid=isPay?x.toId:x.fromId;
    const amountColor=isPay?'var(--danger)':'var(--hjk-primary)';
    const action=isPay

/* ── Settle with specific person sheet ───── */
function openSettleSheet(gid,toId,suggestedAmt){
  const g=getG(gid);const toName=GN(g,toId);
  openSheet(`
    <p class="ff-s fw7" style="font-size:20px;margin-bottom:4px">${t('settleWith')} ${esc(toName)}</p>
    <p class="txt-muted" style="font-size:13px;margin-bottom:18px">${g.emoji} ${esc(g.name)}</p>
    <p class="lbl">${t('settleAmount')}</p>
    <input class="input mb12" type="text" inputmode="decimal" id="stl-amt" value="${suggestedAmt}" style="font-family:'Fraunces',serif;font-size:22px;font-weight:700"/>
    <p class="lbl">${t('settleNote')}</p>
    <textarea class="note-ta mb12" id="stl-note" placeholder="${t('settleNote')}"></textarea>
    <button class="btn btn-primary" onclick="doSettle('${gid}','${toId}')">${t('recordPayment')}</button>
    <button class="btn btn-secondary mt8" onclick="doSettle('${gid}','${toId}',true)">บันทึกการชำระ + JKJ</button>
    <button class="btn btn-ghost mt8" onclick="closeSheet()">${t('cancel')}</button>
  `);
}
function doSettle(gid,toId,syncJkj=false){
  const g=getG(gid);
  const myId=g.members[0]?.id;
  const amt=getV('stl-amt');
  const note=document.getElementById('stl-note')?.value||'';
  if(!amt){toast(t('fillTitleAmt'));return;}
  // Record as a settlement expense: payer=me, owed=toId, amt=0 share (just credit)
  const exp={
    id:uid(),title:`${t('settleWith')} ${GN(g,toId)}${note?' – '+note:''}`,
    amount:amt,emoji:'💸',paidById:myId,
    payers:[{id:myId,amt}],
    splitType:'custom',
    participants:[toId],
    customAmounts:{[toId]:amt},
    percentages:{},
    date:new Date().toISOString(),
    isSettlement:true,
  };
  updG({...g,expenses:[...g.expenses,exp]});
  if(syncJkj){
    recordJKJFromSplitEasy({
      type:'expense',
      title:`หารก่อนจน (HJK): ${t('settleWith')} ${GN(g,toId)}`,
      amount:amt,
      category:'บิลกลุ่ม',
      groupId:gid,
      expenseId:exp.id,
      note:note||`${g.name} · settlement`
    });
  }
  closeSheet();toast(t('paymentRecorded'));
  go('iowe');
}

function paidByMeAmount(g,exp){
  const myId=g.members.find(m=>m.isMe)?.id||g.members[0]?.id;
  const payers=exp.payers&&exp.payers.length?exp.payers:[{id:exp.paidById,amt:exp.amount}];
  return payers.filter(p=>p.id===myId).reduce((a,p)=>a+(+p.amt||0),0);
}
function recordExpenseToJKJ(gid,eid){
  const g=getG(gid);
  const exp=g?.expenses?.find(e=>e.id===eid);
  if(!g||!exp)return;
  const amount=paidByMeAmount(g,exp);
  if(!amount){toast('รายการนี้เราไม่ได้เป็นผู้จ่าย');return;}
  recordJKJFromSplitEasy({
    type:'expense',
    title:`หารก่อนจน (HJK): ${exp.title||g.name}`,
    amount,
    category:'บิลกลุ่ม',
    groupId:gid,
    expenseId:eid,
    date:String(exp.date||'').slice(0,10)||todayStr(),
    note:`${g.emoji||'👥'} ${g.name} · ${exp.splitType||'split'}`
  });
}

/* ── Override openExpDetail to include note button ── */
function openExpDetail(gid,eid){
  const g=getG(gid),exp=g.expenses.find(e=>e.id===eid);if(!exp)return;
  const amt=+exp.amount||0;
  const payers=exp.payers||[{id:exp.paidById,amt}];
  const pm={};payers.forEach(p=>pm[p.id]=(pm[p.id]||0)+(+p.amt||0));

  // Compute per-person shares — single source of truth
  const shares=getShares(exp, g.members);
  const allIds=[...new Set([...Object.keys(shares),...Object.keys(pm)])];

  const pRows=payers.map(p=>{
    const m=g.members.find(x=>x.id===p.id);
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
      ${renderAv(g,m,'av-sm')}
      <span class="flex1 fw7" style="font-size:13px">${GN(g,p.id)}</span>
      <span style="background:var(--accent-lt);color:var(--accent);padding:4px 12px;border-radius:100px;font-size:12px;font-weight:700">${fmt(p.amt)}</span>
    </div>`;
  }).join('');

  // Sub-item breakdown section
  const siSection=exp.subItems&&exp.subItems.length>0?`
    <p class="lbl" style="margin-top:16px">🧾 ${t('subItems')}</p>
    ${exp.subItems.map(item=>{
      const c=item.consumers||[];
      const priceToSplit = item.finalPrice !== undefined ? item.finalPrice : (+item.price || 0);
      const sh=c.length?priceToSplit/c.length:0;
      const iPayerId = item.payerId || exp.paidById;
      const iPayerName = GN(g, iPayerId);
      
      let chargeInfo = [];
      if (item.hasService) chargeInfo.push(`SC ${exp.service_percent || 0}%`);
      if (item.hasVat) chargeInfo.push(`VAT ${exp.vat_percent || 0}%`);
      const chargeStr = chargeInfo.length ? ` (${chargeInfo.join(' + ')})` : '';

      return `<div style="background:var(--bg);border-radius:12px;padding:10px 12px;margin-bottom:6px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div>
            <span class="fw7" style="font-size:13px">${esc(item.name||'?')}</span>
            <span style="font-size:10px;color:var(--muted)">${chargeStr}</span>
          </div>
          <span class="ff-s fw7 txt-accent" style="font-size:14px">${fmt(priceToSplit)}</span>
        </div>
        <p style="font-size:11px;color:var(--muted);margin-bottom:6px">${t('paidBy')}: <strong style="color:var(--ink)">${esc(iPayerName)}</strong></p>
        <div style="display:flex;flex-wrap:wrap;gap:4px">
          ${c.map(id=>{
            const m=g.members.find(x=>x.id===id);
            return `<span style="display:inline-flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:100px;padding:3px 9px;font-size:11px;font-weight:600">
              ${renderAv(g,m,'av-xs')}
              ${GN(g,id)} <span class="txt-muted">${fmt(sh)}</span>
            </span>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}`:'';

  const oRows=allIds.map(id=>{
    const m=g.members.find(x=>x.id===id);
    const share=shares[id]||0;
    const paid=pm[id]||0;
    const net=share-paid; // positive = owes, negative = overpaid
    return `<div class="owe-row">
      <div style="display:flex;align-items:center;gap:8px">
        ${renderAv(g,m,'av-sm')}
        <span class="fw7" style="font-size:13px">${GN(g,id)}</span>
      </div>
      <div class="text-right">

function triggerFileUpload(type) {
  const inp = document.getElementById('import-file');
  if (type === 'image') inp.accept = 'image/*';
  else if (type === 'pdf') inp.accept = '.pdf';
  inp.click();

async function handleImportFile(inp) {
  const file = inp.files[0];
  if (!file) return;
  
  toast(t('detecting'));
  
  try {
    if (file.type.startsWith('image/')) {
      const { data: { text } } = await Tesseract.recognize(file, 'eng+tha');
      showImportPreview(parseBillText(text));
    } else if (file.type === 'application/pdf') {
      const reader = new FileReader();
      reader.onload = async function() {
        const typedarray = new Uint8Array(this.result);
        const pdf = await pdfjsLib.getDocument(typedarray).promise;
        let fullText = '';
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const textContent = await page.getTextContent();
          fullText += textContent.items.map(s => s.str).join(' ') + '\n';
        }
        showImportPreview(parseBillText(fullText));
      };
      reader.readAsArrayBuffer(file);
    }
  } catch (e) {
    console.error(e);
    toast(t('detectFailed'));
  }
  inp.value = ''; // Reset
}

function doPasteImport() {
  const text = document.getElementById('paste-ta')?.value || '';

  showImportPreview(parseBillText(text));
}

function parseBillText(text) {
  const lines = text.split('\n');
  const items = [];
  let vat = 7;
  let svc = 10;
  
  lines.forEach(line => {
    const trimmed = line.trim();
    if (!trimmed) return;

    // Check for VAT
    const vatMatch = trimmed.match(/(?:VAT|ภาษี)\s*([\d,.]+)\s*%?/i);
    if (vatMatch) { 
      const v = parseFloat(vatMatch[1].replace(/,/g, ''));
      if (!isNaN(v)) vat = v; 
      return; 
    }

    // Check for Service Charge
    const svcMatch = trimmed.match(/(?:Service|Svc|ค่าบริการ|ค่าเซอ)\s*([\d,.]+)\s*%?/i);
    if (svcMatch) { 
      const v = parseFloat(svcMatch[1].replace(/,/g, ''));
      if (!isNaN(v)) svc = v; 
      return; 
    }

    // Check for items: "Item Name 100" or "100 Item Name"
    const itemMatch = trimmed.match(/^(.+?)\s+([\d,.]+)$/);
    if (itemMatch) {
      const p = parseFloat(itemMatch[2].replace(/,/g, ''));
      if (!isNaN(p)) items.push({ id: uid(), name: itemMatch[1].trim(), price: p });
    } else {
      const itemMatchRev = trimmed.match(/^([\d,.]+)\s+(.+)$/);
      if (itemMatchRev) {
        const p = parseFloat(itemMatchRev[1].replace(/,/g, ''));
        if (!isNaN(p)) items.push({ id: uid(), name: itemMatchRev[2].trim(), price: p });
      }
    }
  });

  return { items, vat, svc };
}

  document.querySelectorAll('[id^="pre-n-"]').forEach(el => {
    const idx = el.id.split('-').pop();

  });

  const vat = parseFloat(document.getElementById('pre-vat')?.value || 0);
  const svc = parseFloat(document.getElementById('pre-svc')?.value || 0);

  _subItems = items;
  _expMode = 'detail';

  setMode('detail');
  document.getElementById('vat-pct').value = vat;
  document.getElementById('svc-pct').value = svc;
  
  const list = document.getElementById('si-list');
  if (list) {
    list.innerHTML = _subItems.map((item, idx) => renderSIRow(g, item, idx)).join('');

  }
  
  const currentAmt = getV('ea');
  if (currentAmt === 0) {
    let tot = 0;
    _subItems.forEach(s => {
      let sc = s.hasService ? s.price * (svc/100) : 0;

      tot += s.price + sc + vt;
    });
    document.getElementById('ea').value = tot.toFixed(2);
  }
  
  updSITotal();

}

function getExportData() {
  const g = revalidateGroup(getG(S.selectedGroupId));
  const goodExpenses = validExpenses(g);
  const totalNet = goodExpenses.reduce((acc, exp) => acc + getNetTotal(exp, g.members), 0);
  const bals = calcBal(g.members, goodExpenses);
  const txns = getPairwise(g.members, goodExpenses);
  
  const personSummary = g.members.map((m, i) => {
    const shares = goodExpenses.reduce((acc, exp) => {
      const s = getShares(exp, g.members);
      return acc + (s[m.id] || 0);
    }, 0);
    const paid = goodExpenses.reduce((acc, exp) => {
      const netTotal = getNetTotal(exp, g.members);
      const grossTotal = +exp.amount || netTotal;
      const pm = exp.payers || [{id: exp.paidById, amt: grossTotal}];
      const p = pm.find(x => x.id === m.id);
      // Scale paid amount to Net if it was Gross
      const pNet = p ? p.amt * (netTotal / grossTotal) : 0;
      return acc + pNet;
    }, 0);
    const net = shares - paid;
    return { name: GN(g, m.id), share: shares, paid, net, idx: i };
  });

  return { g, total: totalNet, bals, txns, personSummary };
}

    if (e.discount && e.discount.enabled) {
      txt += `${t('discount')}: -${fmt(e.discount.amount)} (${t(e.discount.type + 'Discount')} - ${t(e.discount.source)})\n`;
    }
    
    txt += `${t('paidBy')}: ${GN(g, e.paidById)}\n`;

    } else {
      const shares = getShares(e, g.members);
      Object.entries(shares).forEach(([mid, val]) => {
        if(val > 0) txt += `  - ${GN(g, mid)}: ${fmt(val)}\n`;
      });
    }
  });
  
  txt += `\n💰 ${t('totalBill')}: ${fmt(total)}\n\n`;

    txt += `🤝 ${t('settlementPlan')}\n`;

    txt += `💳 ${S.lang==='th'?'ข้อมูลการโอนเงิน':'Payment Information'}\n`;

      const m = g.members.find(x => x.id === rid);

      txt += `\n${t('payTo')}: ${GN(g, rid)}\n`;
      if(p) {
        if(p.promptpayNumber) txt += `PromptPay: ${p.promptpayNumber}\n`;
        if(p.bankName) txt += `${t('bankName')}: ${p.bankName} (${p.bankCode})\n`;
        if(p.accountNumber) txt += `${t('accountNumber')}: ${p.accountNumber}\n`;
      } else {
        txt += `(No payment profile set)\n`;
      }
    });
    txt += `\n`;
  }
  
  txt += `👤 ${t('perPersonSum')}\n`;
  personSummary.forEach(p => {
    txt += `\n${p.name}\n`;
    txt += `- ${t('ate')}: ${fmt(p.share)}\n`;
    if (p.paid > 0) txt += `- ${t('paid')}: ${fmt(p.paid)}\n`;
    if (p.net > 0.5) txt += `- ${t('pays')}: ${fmt(p.net)}\n`;
    if (p.net < -0.5) txt += `- ${t('receives')}: ${fmt(-p.net)}\n`;
  });
  
  navigator.clipboard.writeText(txt).then(() => {
    toast(t('copySuccess'));

            <span style="font-weight:700; font-size:14px;">${t('payTo')} ${esc(GN(g, rid))}</span>
          </div>
          
          ${p ? `
            <div style="display:flex; flex-direction:column; gap:12px; margin-bottom:20px;">
              ${p.promptpayNumber ? `
                <div style="background:#EFF6FF; border-radius:16px; padding:12px;">
                  <p style="font-size:11px; color:#3B82F6; font-weight:700; text-transform:uppercase; margin-bottom:2px;">PromptPay</p>
                  <p style="font-size:18px; font-weight:700; letter-spacing:1px; color:#1A1A2E;">${p.promptpayNumber}</p>
                </div>
              ` : ''}
              ${p.bankName ? `
                <div style="background:#F7F5F0; border-radius:16px; padding:12px;">
                  <p style="font-size:11px; color:#8A8A9A; font-weight:700; text-transform:uppercase; margin-bottom:2px;">${p.bankName} (${p.bankCode})</p>
                  <p style="font-size:18px; font-weight:700; color:#1A1A2E;">${p.accountNumber || ''}</p>
                </div>
              ` : ''}
            </div>
            ${p.qrImage ? `<img src="${p.qrImage}" style="width:180px; height:180px; border-radius:16px; border: 1px solid #EDEAE4; margin:0 auto;" />` : ''}
          ` : `<p style="color:#8A8A9A; font-style:italic; font-size:14px;">No payment profile set</p>`}
        </div>
      `;
    });
    html += `</div>`;
  }
  
  html += `
    <div style="background:#fff; border-radius:28px; padding:30px; box-shadow:0 10px 40px rgba(0,0,0,0.05); margin-bottom:20px;">
      <h3 style="font-size:13px; color:#8A8A9A; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:18px; font-weight:700;">${t('perPersonSum')}</h3>
  `;
  
  personSummary.forEach(p => {
    const m=g.members.find(mx=>mx.id===g.members[p.idx].id);
    const av = m.emoji || PXA[p.idx % PXA.length];
    html += `
      <div style="margin-bottom:20px; padding-bottom: 15px; border-bottom: 1px solid #F7F5F0;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
          <div style="display:flex; align-items:center; gap:8px;">
            <div style="width:36px; height:36px; border-radius:50%; background:#F7F5F0; display:flex; align-items:center; justify-content:center; font-size:18px;">${av}</div>
            <span style="font-weight:700; font-size:15px; color:#1A1A2E;">${esc(p.name)}</span>
          </div>
          <span style="font-size:13px; color:#8A8A9A;">${t('ate')}: <strong style="color:#1A1A2E;">${fmt(p.share)}</strong></span>
        </div>
        <div style="display:flex; gap:10px; font-size:12px;">
          ${p.paid > 0 ? `<div style="background:#E8F5EE; color:#4CAF7D; padding:5px 12px; border-radius:10px; font-weight:700;">${t('paid')} ${fmt(p.paid)}</div>` : ''}
          ${p.net > 0.5 ? `<div style="background:#FEE2E2; color:#FF3B5C; padding:5px 12px; border-radius:10px; font-weight:700;">${t('pays')} ${fmt(p.net)}</div>` : ''}
          ${p.net < -0.5 ? `<div style="background:#EFF6FF; color:#3B82F6; padding:5px 12px; border-radius:10px; font-weight:700;">${t('receives')} ${fmt(-p.net)}</div>` : ''}
        </div>
      </div>
    `;
  });
  
  html += `</div>
    <div style="text-align:center; margin-top:40px; border-top: 1px solid #EDEAE4; padding-top: 20px;">
      <p style="color:#8A8A9A; font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase;">Generated by หารก่อนจน (HJK)</p>
    </div>
  `;
  
  container.innerHTML = html;
  document.body.appendChild(container);
  
  const canvas = await html2canvas(container, {
    backgroundColor: '#F7F5F0',
    scale: 2,
    logging: false,
    useCORS: true,
    allowTaint: true
  });
  
  document.body.removeChild(container);
  return canvas;
}

async function exportAsImage() {
  const g = getG(S.selectedGroupId);
  toast(t('detecting'));
  const canvas = await generateSummaryCanvas();
  
  const link = document.createElement('a');
  link.download = `HJK_${g.name.replace(/\s+/g, '_')}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
  closeSheet();
}

async function exportAsPDF() {
  const g = getG(S.selectedGroupId);
  toast(t('detecting'));
  const canvas = await generateSummaryCanvas();
  
  const { jsPDF } = window.jspdf;
  const imgData = canvas.toDataURL('image/png');
  
  // PDF dimensions (A4: 210 x 297 mm)
  const doc = new jsPDF('p', 'mm', 'a4');
  const imgProps = doc.getImageProperties(imgData);
  const pdfWidth = doc.internal.pageSize.getWidth();
  const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
  
  // If content is longer than one page, we might need a longer PDF or multiple pages
  // For simplicity and best visual, we'll use a dynamic page height if it exceeds A4
  if (pdfHeight > 297) {
    const longDoc = new jsPDF('p', 'mm', [pdfWidth, pdfHeight + 20]);
    longDoc.addImage(imgData, 'PNG', 0, 10, pdfWidth, pdfHeight);
    longDoc.save(`HJK_${g.name.replace(/\s+/g, '_')}.pdf`);
  } else {
    doc.addImage(imgData, 'PNG', 0, 10, pdfWidth, pdfHeight);
    doc.save(`HJK_${g.name.replace(/\s+/g, '_')}.pdf`);
  }
  
  closeSheet();
}

function render(){
  document.body.className=S.lang==='th'?'th':'';
  const glt=document.getElementById('global-lang-toggle');
  if(glt) glt.innerHTML = LT();
  
  const screens={
    'home':()=>{S.activeNav='home';return scrHome();},
    'create-group':scrCreateGroup,
    'edit-group':scrEditGroup,
    'group':scrGroupFiltered,
    'add-expense':()=>scrAddExp(null),
    'edit-expense':()=>scrAddExp(S.editExpenseId),
    'summary':scrSummary,
    'monthly':scrMonthlySummary,
    'installments':scrInstall,
    'cycles':scrCycles,
    'checklist':scrChecklist,
    'iowe':()=>{S.activeNav='iowe';return scrIOwe();},
    'activity':()=>{S.activeNav='activity';return scrActivity();},
    'sport':()=>{S.activeNav='sport';return scrSportSplit();},
    'profile':()=>{S.activeNav='profile';return scrProfile();},
  };
  const fn=screens[S.screen]||screens['home'];
  const html=fn();
  const ex=document.getElementById('mc');if(ex)ex.remove();
  const div=document.createElement('div');div.id='mc';div.innerHTML=html;
  document.getElementById('app').insertBefore(div,document.getElementById('bottom-nav'));
  renderNav();
  if(S.screen==='create-group')initCG();
  if(S.screen==='add-expense'){_ST='equal';updSplit();chkExpForm();}
  if(S.screen==='edit-expense'){
    const _exp=getG(S.selectedGroupId)?.expenses.find(e=>e.id===S.editExpenseId);
    if(_exp?.subItems&&_exp.subItems.length>0){
      // subitem mode - _subItems and _expMode already pre-populated in scrAddExp
      setMode('detail');updSITotal();
    } else {
      _ST=_exp?.splitType||'equal';setST(_ST);updSplit();
    }
    chkExpForm();
  }
  if(S.screen==='installments'){_ICT='monthly';prvInst();}
  if(S.screen==='cycles')_CF='monthly';
  window.scrollTo(0,0);
  // Attach math calculator to all numeric fields after render
  requestAnimationFrame(() => initMathFields(document.getElementById('mc') || document));
}

/* ═══════════════ BOOT ═══════════════════════════════════ */
load();render();
</script>
<!-- ── COPY CODE BUTTON ──────────────────────────────── -->
<button id="copy-btn" onclick="copyCode()" title="Copy all code"
  style="position:fixed;z-index:9999;
    width:52px;height:52px;border-radius:50%;border:none;
    background:linear-gradient(135deg,#1A1A2E,#2D2D4E);
    color:#fff;font-size:22px;cursor:grab;
    box-shadow:0 4px 20px rgba(26,26,46,.35);
    display:flex;align-items:center;justify-content:center;
    transition:transform .15s,opacity .15s;
    touch-action:none;user-select:none">
  📋
</button>
<div id="copy-toast"
  style="position:fixed;z-index:9999;
    background:#1A1A2E;color:#fff;padding:8px 16px;
    border-radius:100px;font-size:13px;font-weight:600;
    opacity:0;pointer-events:none;transition:opacity .3s;
    white-space:nowrap;box-shadow:0 4px 16px rgba(26,26,46,.3)">
  ✅ Copied!
</div>
<script>
(function(){
  const btn=document.getElementById('copy-btn');
  const ct=document.getElementById('copy-toast');
  
  // Restore position
  let x = localStorage.getItem('copyButtonX');
  let y = localStorage.getItem('copyButtonY');
  if(x !== null && y !== null){
    btn.style.left = x + 'px';
    btn.style.top = y + 'px';
  } else {
    btn.style.bottom = '100px';
    btn.style.right = '16px';
  }

  function updateToastPos() {
    const rect = btn.getBoundingClientRect();
    ct.style.left = rect.left + 'px';
    ct.style.top = (rect.top - 45) + 'px';
  }

  let isDragging = false;
  let startX, startY, initialX, initialY;
  let hasMoved = false;

  btn.onpointerdown = function(e) {
    isDragging = true;
    hasMoved = false;
    btn.style.cursor = 'grabbing';
    startX = e.clientX;
    startY = e.clientY;
    const rect = btn.getBoundingClientRect();
    initialX = rect.left;
    initialY = rect.top;
    btn.setPointerCapture(e.pointerId);
  };

  btn.onpointermove = function(e) {
    if (!isDragging) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    if (Math.abs(dx) > 5 || Math.abs(dy) > 5) hasMoved = true;
    
    let newX = initialX + dx;
    let newY = initialY + dy;
    
    // Keep within viewport
    newX = Math.max(0, Math.min(window.innerWidth - 52, newX));
    newY = Math.max(0, Math.min(window.innerHeight - 52, newY));
    
    btn.style.left = newX + 'px';
    btn.style.top = newY + 'px';
    btn.style.bottom = 'auto';
    btn.style.right = 'auto';
  };

  btn.onpointerup = function(e) {
    if (!isDragging) return;
    isDragging = false;
    btn.style.cursor = 'grab';
    localStorage.setItem('copyButtonX', parseInt(btn.style.left));
    localStorage.setItem('copyButtonY', parseInt(btn.style.top));
    if (hasMoved) {
      // Prevent click if we dragged
      e.stopPropagation();
    }
  };

  window.copyCode = function(){
    if(hasMoved) return; // Don't copy if it was a drag
    fetch(window.location.href)
      .then(r=>r.text())
      .then(html=>{
        navigator.clipboard.writeText(html).then(()=>{
          btn.textContent='✅';
          updateToastPos();
          ct.style.opacity='1';
          setTimeout(()=>{btn.textContent='📋';ct.style.opacity='0';},2000);
        }).catch(()=>{
          const ta=document.createElement('textarea');
          ta.value=html;ta.style.position='fixed';ta.style.opacity='0';
          document.body.appendChild(ta);ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          btn.textContent='✅';
          updateToastPos();
          ct.style.opacity='1';
          setTimeout(()=>{btn.textContent='📋';ct.style.opacity='0';},2000);
        });
      });
  };
})();
</script>
